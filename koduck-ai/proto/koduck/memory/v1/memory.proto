syntax = "proto3";

package koduck.memory.v1;

import "koduck/contract/v1/shared.proto";

option go_package = "github.com/hailingu/koduck-quant/proto/koduck/memory/v1;memoryv1";

// MemoryService — 会话记忆管理服务（first-class service contract）
//
// This proto is the frozen long-lived southbound contract between koduck-ai
// and koduck-memory for V1. Existing tag numbers must remain stable.
service MemoryService {
  // 能力发现与版本协商
  rpc GetCapabilities(koduck.contract.v1.RequestMeta) returns (koduck.contract.v1.Capability);

  rpc GetCategoryCatalog(GetCategoryCatalogRequest) returns (GetCategoryCatalogResponse);

  // 创建或更新会话元数据
  rpc UpsertSessionMeta(UpsertSessionMetaRequest) returns (UpsertSessionMetaResponse);

  // 获取会话信息
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse);

  rpc GetSessionTranscript(GetSessionTranscriptRequest) returns (GetSessionTranscriptResponse);

  rpc GetAllSessionIds(GetAllSessionIdsRequest) returns (GetSessionIdsLookupResponse);

  rpc GetSessionIdsByDomainClass(GetSessionIdsByDomainClassRequest) returns (GetSessionIdsLookupResponse);

  rpc GetSessionIdsByNer(GetSessionIdsByNerRequest) returns (GetSessionIdsLookupResponse);

  rpc GetSessionIdsByIntentType(GetSessionIdsByIntentTypeRequest) returns (GetSessionIdsLookupResponse);

  // 记忆检索（支持多种检索策略）
  rpc QueryMemory(QueryMemoryRequest) returns (QueryMemoryResponse);

  // 追加记忆
  rpc AppendMemory(AppendMemoryRequest) returns (AppendMemoryResponse);

  // 生成记忆摘要（可异步）
  rpc SummarizeMemory(SummarizeMemoryRequest) returns (SummarizeMemoryResponse);
}

// ==================== UpsertSessionMeta ====================

message UpsertSessionMetaRequest {
  koduck.contract.v1.RequestMeta meta = 1;
  string session_id = 2;
  string title = 3;
  string status = 4;
  map<string, string> extra = 5;
  string parent_session_id = 6;
  string forked_from_session_id = 7;
  int64 last_message_at = 8;

  reserved 9 to 19;
}

message GetCategoryCatalogRequest {
  koduck.contract.v1.RequestMeta meta = 1;

  reserved 2 to 19;
}

message GetCategoryCatalogResponse {
  bool ok = 1;
  repeated string domain_categories = 2;
  repeated string ner_categories = 3;
  repeated string intent_categories = 4;
  koduck.contract.v1.ErrorDetail error = 5;
}

message UpsertSessionMetaResponse {
  bool ok = 1;
  koduck.contract.v1.ErrorDetail error = 2;
}

// ==================== GetSession ====================

message GetSessionRequest {
  koduck.contract.v1.RequestMeta meta = 1;
  string session_id = 2;

  reserved 3 to 19;
}

message GetSessionResponse {
  bool ok = 1;
  SessionInfo session = 2;
  koduck.contract.v1.ErrorDetail error = 3;
}

message GetSessionTranscriptRequest {
  koduck.contract.v1.RequestMeta meta = 1;
  string session_id = 2;

  reserved 3 to 19;
}

message GetSessionTranscriptResponse {
  bool ok = 1;
  repeated SessionTranscriptEntry entries = 2;
  string transcript_text = 3;
  koduck.contract.v1.ErrorDetail error = 4;
}

message GetAllSessionIdsRequest {
  koduck.contract.v1.RequestMeta meta = 1;

  reserved 2 to 19;
}

message GetSessionIdsByDomainClassRequest {
  koduck.contract.v1.RequestMeta meta = 1;
  string domain_class = 2;

  reserved 3 to 19;
}

message GetSessionIdsByNerRequest {
  koduck.contract.v1.RequestMeta meta = 1;
  string ner = 2;

  reserved 3 to 19;
}

message GetSessionIdsByIntentTypeRequest {
  koduck.contract.v1.RequestMeta meta = 1;
  string intent_type = 2;

  reserved 3 to 19;
}

message GetSessionIdsLookupResponse {
  bool ok = 1;
  repeated string session_ids = 2;
  koduck.contract.v1.ErrorDetail error = 3;
}

// ==================== QueryMemory ====================

message QueryMemoryRequest {
  koduck.contract.v1.RequestMeta meta = 1;
  string query_text = 2;
  string session_id = 3;
  string domain_class = 4;
  int32 top_k = 5;
  RetrievePolicy retrieve_policy = 6;
  string page_token = 7;
  int32 page_size = 8;
  QueryIntent query_intent = 20;

  reserved 9 to 19;
}

message QueryMemoryResponse {
  bool ok = 1;
  repeated MemoryHit hits = 2;
  string next_page_token = 3;
  koduck.contract.v1.ErrorDetail error = 4;
}

// ==================== AppendMemory ====================

message AppendMemoryRequest {
  koduck.contract.v1.RequestMeta meta = 1;
  string session_id = 2;
  repeated MemoryEntry entries = 3;

  reserved 4 to 19;
}

message AppendMemoryResponse {
  bool ok = 1;
  int32 appended_count = 2;
  koduck.contract.v1.ErrorDetail error = 3;
}

// ==================== SummarizeMemory ====================

message SummarizeMemoryRequest {
  koduck.contract.v1.RequestMeta meta = 1;
  string session_id = 2;
  string strategy = 3;

  reserved 4 to 19;
}

message SummarizeMemoryResponse {
  bool ok = 1;
  string summary = 2;
  koduck.contract.v1.ErrorDetail error = 3;
}

// ==================== Common Messages ====================

// 会话信息
message SessionInfo {
  string session_id = 1;
  string tenant_id = 2;
  string user_id = 3;
  string parent_session_id = 4;
  string forked_from_session_id = 5;
  string title = 6;
  string status = 7;
  int64 created_at = 8;
  int64 updated_at = 9;
  int64 last_message_at = 10;
  map<string, string> extra = 11;

  reserved 12 to 19;
}

// 记忆检索命中结果
message MemoryHit {
  string session_id = 1;
  string l0_uri = 2;
  float score = 3;
  repeated string match_reasons = 4;
  string snippet = 5;

  reserved 6 to 19;
}

// 记忆条目
message MemoryEntry {
  string role = 1;
  string content = 2;
  int64 timestamp = 3;
  map<string, string> metadata = 4;

  reserved 5 to 19;
}

message SessionTranscriptEntry {
  string entry_id = 1;
  string role = 2;
  string content = 3;
  int64 timestamp = 4;
  int64 sequence_num = 5;
  map<string, string> metadata = 6;
  string l0_uri = 7;

  reserved 8 to 19;
}

// ==================== Enums ====================

// 记忆检索策略
enum RetrievePolicy {
  RETRIEVE_POLICY_UNSPECIFIED = 0;
  RETRIEVE_POLICY_DOMAIN_FIRST = 1;
  RETRIEVE_POLICY_SUMMARY_FIRST = 2;
  RETRIEVE_POLICY_HYBRID = 3;

  reserved 4 to 19;
}

enum QueryIntent {
  QUERY_INTENT_UNSPECIFIED = 0;
  QUERY_INTENT_RECALL = 1;
  QUERY_INTENT_COMPARE = 2;
  QUERY_INTENT_DISAMBIGUATE = 3;
  QUERY_INTENT_CORRECT = 4;
  QUERY_INTENT_EXPLAIN = 5;
  QUERY_INTENT_DECIDE = 6;
  QUERY_INTENT_NONE = 7;

  reserved 8 to 19;
}
