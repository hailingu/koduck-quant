syntax = "proto3";
package koduck.contract.v1;

option go_package = "github.com/hailingu/koduck-quant/proto/koduck/contract/v1;contractv1";

message RequestMeta {
  string request_id = 1;
  string session_id = 2;
  string user_id = 3;
  string tenant_id = 4;
  string trace_id = 5;
  string idempotency_key = 6;
  int64 deadline_ms = 7;
  string api_version = 8;
}

message ErrorDetail {
  string code = 1;
  string message = 2;
  bool retryable = 3;
  bool degraded = 4;
  string upstream = 5;
  int64 retry_after_ms = 6;
}

message Capability {
  string service = 1;
  repeated string contract_versions = 2;
  map<string, string> features = 3;
  map<string, string> limits = 4;
}
