spring:
  application:
    name: koduck-backend
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    mail:
      enabled: false

logging:
  level:
    root: INFO
    com.koduck: DEBUG

# JWT 配置
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-for-jwt-signing-must-be-at-least-32-characters-long}
  access-token-expiration: 86400000  # 24小时 (毫秒)
  refresh-token-expiration: 604800000  # 7天 (毫秒)
  token-prefix: "Bearer "
  header-name: "Authorization"

---
# 邮件配置
# 注意: 生产环境需要配置 SMTP 服务器
spring:
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# Koduck 自定义配置
koduck:
  pagination:
    default-page-size: 20
    max-page-size: 100
  agent:
    url: ${AGENT_URL:http://agent:8000}
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:noreply@koduck.local}
    from-name: ${MAIL_FROM_NAME:Koduck Quant}
    password-reset-token-expiry-minutes: 30
    password-reset-url-template: ${PASSWORD_RESET_URL_TEMPLATE:http://localhost:3000/reset-password?token={token}}
  websocket:
    endpoint: /ws
    application-destination-prefix: /app
    allowed-origins:
      - "*"
    heartbeat-interval: 25
    broker:
      topic-prefix: /topic
      queue-prefix: /queue

# Demo 用户配置
# 注意: 生产环境应设置 app.demo.enabled=false 或不设置 APP_DEMO_PASSWORD
app:
  demo:
    enabled: ${APP_DEMO_ENABLED:false}
    username: ${APP_DEMO_USERNAME:demo}
    password: ${APP_DEMO_PASSWORD:}  # 启用时必须配置

# SpringDoc OpenAPI 配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    doc-expansion: none
    default-models-expand-depth: 1
    default-model-expand-depth: 1
    display-request-duration: true
  show-actuator: false
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
