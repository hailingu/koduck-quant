spring:
  application:
    name: koduck-backend
  profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:koduck_dev}
    username: ${DB_USERNAME:koduck}
    password: ${DB_PASSWORD:koduck}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      pool-name: KoduckHikariPool
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: ${JPA_JDBC_BATCH_SIZE:50}
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
  config:
    import: optional:vault://
  cloud:
    vault:
      enabled: ${VAULT_ENABLED:false}
      fail-fast: ${VAULT_FAIL_FAST:false}
      authentication: token
      token: ${VAULT_TOKEN:}
      scheme: ${VAULT_SCHEME:http}
      host: ${VAULT_HOST:localhost}
      port: ${VAULT_PORT:8200}
      kv:
        enabled: true
        backend: ${VAULT_KV_BACKEND:secret}
        default-context: ${VAULT_KV_CONTEXT:koduck-backend}
        profile-separator: /
  threads:
    virtual:
      enabled: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    listener:
      simple:
        acknowledge-mode: auto
        default-requeue-rejected: false

server:
  port: 8080
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    mail:
      enabled: false

logging:
  level:
    root: INFO
    com.koduck: DEBUG

# JWT 配置
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 86400000  # 24小时 (毫秒)
  refresh-token-expiration: 604800000  # 7天 (毫秒)
  token-prefix: "Bearer "
  header-name: "Authorization"

---
# 邮件配置
# 注意: 生产环境需要配置 SMTP 服务器
spring:
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# Koduck 自定义配置
koduck:
  pagination:
    default-page-size: 20
    max-page-size: 100
  agent:
    url: ${AGENT_URL:http://agent:8000}
  security:
    permit-all-patterns:
      - /api/v1/auth/**
      - /actuator/health
      - /api/v1/health/**
      - /api/v1/monitoring/**
      - /ws/**
      - /api/v1/a-share/**
    permit-all-get-patterns:
      - /api/v1/market/**
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:noreply@koduck.local}
    from-name: ${MAIL_FROM_NAME:Koduck Quant}
    password-reset-token-expiry-minutes: 30
    password-reset-url-template: ${PASSWORD_RESET_URL_TEMPLATE:http://localhost:3000/reset-password?token={token}}
  rate-limit:
    login-failure:
      max-failures-per-user: ${RATE_LIMIT_LOGIN_FAILURE_MAX_PER_USER:5}
      max-failures-per-ip: ${RATE_LIMIT_LOGIN_FAILURE_MAX_PER_IP:20}
      window-duration: ${RATE_LIMIT_LOGIN_FAILURE_WINDOW:15m}
    password-reset:
      max-requests-per-user: ${RATE_LIMIT_PASSWORD_RESET_MAX_PER_USER:3}
      max-requests-per-email: ${RATE_LIMIT_PASSWORD_RESET_MAX_PER_EMAIL:5}
      max-requests-per-ip: ${RATE_LIMIT_PASSWORD_RESET_MAX_PER_IP:10}
      window-duration: ${RATE_LIMIT_PASSWORD_RESET_WINDOW:1h}
  websocket:
    endpoint: /ws
    application-destination-prefix: /app
    allowed-origins: ${WEBSOCKET_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
    heartbeat-interval: 25
    broker:
      topic-prefix: /topic
      queue-prefix: /queue
  messaging:
    price-push:
      enabled: ${PRICE_PUSH_MQ_ENABLED:true}
      exchange: ${PRICE_PUSH_MQ_EXCHANGE:koduck.price.exchange}
      queue: ${PRICE_PUSH_MQ_QUEUE:koduck.price.realtime.queue}
      routing-key: ${PRICE_PUSH_MQ_ROUTING_KEY:stock.realtime}
      dead-letter-exchange: ${PRICE_PUSH_MQ_DLX:koduck.price.dlx}
      dead-letter-queue: ${PRICE_PUSH_MQ_DLQ:koduck.price.realtime.dlq}
      dead-letter-routing-key: ${PRICE_PUSH_MQ_DLK:stock.realtime.dlq}

# Demo 用户配置
# 注意: 生产环境应设置 app.demo.enabled=false 或不设置 APP_DEMO_PASSWORD
app:
  demo:
    enabled: ${APP_DEMO_ENABLED:false}
    username: ${APP_DEMO_USERNAME:demo}
    password: ${APP_DEMO_PASSWORD:demo123}

# Resilience4j 熔断配置
resilience4j:
  circuitbreaker:
    instances:
      dataServiceClient:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: ${DATA_SERVICE_CB_WINDOW_SIZE:20}
        minimumNumberOfCalls: ${DATA_SERVICE_CB_MIN_CALLS:10}
        failureRateThreshold: ${DATA_SERVICE_CB_FAILURE_RATE:50}
        waitDurationInOpenState: ${DATA_SERVICE_CB_OPEN_WAIT:30s}
        permittedNumberOfCallsInHalfOpenState: ${DATA_SERVICE_CB_HALF_OPEN_CALLS:3}
        automaticTransitionFromOpenToHalfOpenEnabled: true
        recordExceptions:
          - org.springframework.web.client.RestClientException
          - java.lang.RuntimeException

# SpringDoc OpenAPI 配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    doc-expansion: none
    default-models-expand-depth: 1
    default-model-expand-depth: 1
    display-request-duration: true
  show-actuator: false
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
