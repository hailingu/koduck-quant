spring:
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:koduck_dev}
    username: ${DB_USERNAME:koduck}
    password: ${DB_PASSWORD:koduck}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  flyway:
    enabled: true
    validate-on-migrate: false
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

credential:
  encryption:
    key: ${CREDENTIAL_ENCRYPTION_KEY:dev-only-credential-encryption-key-change-me}

# Data Service 配置
koduck:
  data-service:
    base-url: ${DATA_SERVICE_URL:http://localhost:8000/api/v1}
    connect-timeout-ms: 5000
    read-timeout-ms: 20000
    max-retries: 3
    realtime-update-path: /market/realtime/update
    enabled: true

  # Finnhub 美股 API 配置
  finnhub:
    enabled: ${FINNHUB_ENABLED:true}
    api-key: ${FINNHUB_API_KEY:}
    base-url: https://finnhub.io/api/v1
    connect-timeout-ms: 10000
    read-timeout-ms: 30000
  messaging:
    price-push:
      enabled: ${PRICE_PUSH_MQ_ENABLED:true}

logging:
  level:
    org.hibernate.SQL: INFO
    org.hibernate.type.descriptor.sql.BasicBinder: INFO
    com.koduck.service: DEBUG

# Demo 用户配置（仅开发环境默认开启）
app:
  demo:
    enabled: ${APP_DEMO_ENABLED:true}
