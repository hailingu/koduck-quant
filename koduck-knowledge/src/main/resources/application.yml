spring:
  application:
    name: koduck-knowledge
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  threads:
    virtual:
      enabled: true
  main:
    banner-mode: off

server:
  port: ${SERVER_PORT:8084}
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  config: classpath:log4j2.xml
  level:
    root: INFO
    com.koduck.knowledge: DEBUG

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

koduck:
  knowledge:
    datasource:
      url: ${KODUCK_KNOWLEDGE_DB_URL:jdbc:postgresql://localhost:5432/koduck_knowledge}
      username: ${KODUCK_KNOWLEDGE_APP_DB_USER:koduck}
      password: ${KODUCK_KNOWLEDGE_APP_DB_PASSWORD:koduck}
      driver-class-name: org.postgresql.Driver

