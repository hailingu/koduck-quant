apiVersion: v1
kind: Secret
metadata:
  name: koduck-auth-secrets
  namespace: koduck
type: Opaque
stringData:
  database-url: "postgresql://user:password@postgres:5432/koduck_auth"
  redis-url: "redis://redis:6379"

---
apiVersion: v1
kind: Secret
metadata:
  name: koduck-auth-jwt-keys
  namespace: koduck
type: Opaque
data:
  # Base64 encoded RSA keys
  # Generate with: base64 -w 0 < private.pem
  private.pem: ""
  public.pem: ""
