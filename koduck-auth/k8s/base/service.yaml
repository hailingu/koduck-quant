apiVersion: v1
kind: Service
metadata:
  name: koduck-auth
  namespace: koduck
  labels:
    app: koduck-auth
spec:
  type: ClusterIP
  selector:
    app: koduck-auth
  ports:
    - name: http
      port: 8081
      targetPort: http
      protocol: TCP
    - name: grpc
      port: 50051
      targetPort: grpc
      protocol: TCP

---
# Headless service for gRPC client load balancing
apiVersion: v1
kind: Service
metadata:
  name: koduck-auth-grpc
  namespace: koduck
  labels:
    app: koduck-auth
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: koduck-auth
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
      protocol: TCP
