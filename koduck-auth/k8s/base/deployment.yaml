apiVersion: apps/v1
kind: Deployment
metadata:
  name: koduck-auth
  namespace: koduck
  labels:
    app: koduck-auth
spec:
  replicas: 2
  selector:
    matchLabels:
      app: koduck-auth
  template:
    metadata:
      labels:
        app: koduck-auth
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: koduck-auth
          image: koduck/koduck-auth:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
            - name: grpc
              containerPort: 50051
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: KODUCK_AUTH__SERVER__HTTP_ADDR
              value: "0.0.0.0:8081"
            - name: KODUCK_AUTH__SERVER__GRPC_ADDR
              value: "0.0.0.0:50051"
            - name: KODUCK_AUTH__DATABASE__URL
              valueFrom:
                secretKeyRef:
                  name: koduck-auth-secrets
                  key: database-url
            - name: KODUCK_AUTH__REDIS__URL
              valueFrom:
                secretKeyRef:
                  name: koduck-auth-secrets
                  key: redis-url
            - name: KODUCK_AUTH__JWT__PRIVATE_KEY_PATH
              value: "/app/keys/private.pem"
            - name: KODUCK_AUTH__JWT__PUBLIC_KEY_PATH
              value: "/app/keys/public.pem"
          volumeMounts:
            - name: jwt-keys
              mountPath: /app/keys
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: jwt-keys
          secret:
            secretName: koduck-auth-jwt-keys
            items:
              - key: private.pem
                path: private.pem
              - key: public.pem
                path: public.pem
