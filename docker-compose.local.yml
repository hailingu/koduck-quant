version: '3.8'

services:
  # PostgreSQL Database
  postgresql:
    image: postgres:15-alpine
    container_name: koduck-postgresql
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-koduck_dev}
      POSTGRES_USER: ${POSTGRES_USER:-koduck}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-koduck}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    networks:
      - koduck-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-koduck} -d ${POSTGRES_DB:-koduck_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: koduck-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - koduck-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    command: redis-server --appendonly yes

  # Python Data Service
  data-service:
    build:
      context: ./koduck-data-service
      # dockerfile: Dockerfile
      args:
        - PIP_INDEX_URL=${PIP_INDEX_URL:-https://pypi.org/simple}
    container_name: koduck-data-service
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - POSTGRES_HOST=postgresql
      - POSTGRES_PORT=5432
      - POSTGRES_DB=koduck_dev
      - POSTGRES_USER=koduck
      - POSTGRES_PASSWORD=koduck
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=INFO
      - DEBUG=false
      # Eastmoney Client Settings
      - EASTMONEY_COOKIE_TTL=3600
      - EASTMONEY_MIN_REQUEST_INTERVAL=3.0
      # Timezone for scheduled tasks (market hours in Shanghai)
      - TZ=Asia/Shanghai
      # K-line scheduler configuration
      - KLINE_CHECK_INTERVAL=3600
      - KLINE_UPDATE_TIME=15:35
    volumes:
      # Mount K-line data for persistence (rw: container can update CSV)
      - ./koduck-data-service/data:/app/data
      # Mount logs directory
      - ./koduck-data-service/logs:/app/logs
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - koduck-network
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health', timeout=5.0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Java Backend
  backend:
    build:
      context: ./koduck-backend
      # dockerfile: Dockerfile
    image: koduck-backend:local
    container_name: koduck-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - DB_HOST=postgresql
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-koduck_dev}
      - DB_USERNAME=${POSTGRES_USER:-koduck}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-koduck}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATA_SERVICE_URL=http://data-service:8000/api/v1
      - JWT_SECRET=${JWT_SECRET:-}
      - DEFAULT_LLM_PROVIDER=${DEFAULT_LLM_PROVIDER:-minimax}
      - LLM_PROVIDER=${LLM_PROVIDER:-}
      - LLM_API_KEY=${LLM_API_KEY:-${MINIMAX_API_KEY:-${OPENAI_API_KEY:-}}}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-${LLM_API_KEY:-${OPENAI_API_KEY:-}}}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - LLM_API_BASE=${LLM_API_BASE:-https://api.gptsapi.net}
      - OPENAI_API_BASE=${OPENAI_API_BASE:-https://api.openai.com/v1}
      - MINIMAX_API_BASE=${MINIMAX_API_BASE:-https://api.minimax.chat/v1}
      - DEEPSEEK_API_BASE=${DEEPSEEK_API_BASE:-https://api.deepseek.com/v1}
      # Finnhub US Stock API
      - FINNHUB_ENABLED=${FINNHUB_ENABLED:-true}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY:-}
      # Demo user configuration (local only)
      - APP_DEMO_ENABLED=${APP_DEMO_ENABLED:-true}
      - APP_DEMO_USERNAME=${APP_DEMO_USERNAME:-demo}
      - APP_DEMO_PASSWORD=${APP_DEMO_PASSWORD:-demo123}
    env_file:
      - .env.local
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      data-service:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - koduck-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Koduck Agent - LLM API Gateway
  agent:
    build:
      context: ./koduck-agent
      # dockerfile: Dockerfile
    container_name: koduck-agent
    ports:
      - "8001:8000"
    environment:
      - GPT_API_KEY=${GPT_API_KEY:-}
      - LLM_API_KEY=${LLM_API_KEY:-${MINIMAX_API_KEY:-${OPENAI_API_KEY:-}}}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-${LLM_API_KEY:-${OPENAI_API_KEY:-}}}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - POSTGRES_HOST=postgresql
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-koduck_dev}
      - POSTGRES_USER=${POSTGRES_USER:-koduck}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-koduck}
      - MEMORY_DATABASE_URL=postgresql://${POSTGRES_USER:-koduck}:${POSTGRES_PASSWORD:-koduck}@postgresql:5432/${POSTGRES_DB:-koduck_dev}
      - KODUCK_KLINE_DATABASE_URL=postgresql://${POSTGRES_USER:-koduck}:${POSTGRES_PASSWORD:-koduck}@postgresql:5432/${POSTGRES_DB:-koduck_dev}
      - LLM_API_BASE=${LLM_API_BASE:-https://api.gptsapi.net}
      - OPENAI_API_BASE=${OPENAI_API_BASE:-https://api.openai.com/v1}
      - MINIMAX_API_BASE=${MINIMAX_API_BASE:-https://api.minimax.chat/v1}
      - DEEPSEEK_API_BASE=${DEEPSEEK_API_BASE:-https://api.deepseek.com/v1}
      - LOG_LEVEL=INFO
    env_file:
      - .env.local
    volumes:
      # Mount local code for development (changes take effect on restart)
      - ./koduck-agent/koduck:/app/koduck:ro
    restart: unless-stopped
    networks:
      - koduck-network
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health', timeout=5.0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Frontend
  frontend:
    build:
      context: ./koduck-frontend
      # dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=
    container_name: koduck-frontend
    ports:
      - "3000:80"
    environment:
      - NGINX_BACKEND_URL=http://backend:8080
    depends_on:
      postgresql:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - koduck-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  koduck-network:
    driver: bridge
    name: koduck-network
