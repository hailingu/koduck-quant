<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .kinetic-bg {
            background: radial-gradient(circle at 50% 50%, #1d2026 0%, #10131a 100%);
            overflow: hidden;
            position: relative;
          }
          .flow-stream {
            position: absolute;
            background: linear-gradient(to bottom, transparent, #00f2ff, transparent);
            width: 1px;
            height: 150px;
            opacity: 0.15;
          }

<body class="bg-background text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container">
<!-- Kinetic Background Layout -->
<div class="fixed inset-0 kinetic-bg -z-10">
<!-- Simulated Fluid Motion Fragments -->
<div class="flow-stream left-[10%] top-[-20%] h-[300px]"></div>
<div class="flow-stream left-[25%] top-[40%] h-[200px]"></div>
<div class="flow-stream left-[60%] top-[10%] h-[400px]"></div>
<div class="flow-stream left-[85%] top-[60%] h-[150px]"></div>
<!-- Subtle Glow Orbs -->
<div class="absolute top-1/4 -left-20 w-96 h-96 bg-primary-container/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-1/4 -right-20 w-80 h-80 bg-secondary-container/5 rounded-full blur-[100px]"></div>
</div>
<!-- Main Auth Canvas -->
<main class="min-h-screen flex flex-col items-center justify-center px-6 py-12">
<!-- Brand Header: Minimalist Branding -->
<header class="mb-12 text-center">
<h1 class="font-headline text-3xl md:text-4xl font-bold tracking-tighter text-primary-container mb-2">
                The Fluid Ledger
            </h1>
<p class="font-label text-[10px] uppercase tracking-[0.3em] text-outline opacity-80">
                Kinetic Command System
            </p>
</header>
<!-- Login Container -->
<div class="w-full max-w-[420px] bg-surface-container rounded-lg p-8 shadow-2xl relative border border-outline-variant/10 backdrop-blur-md">
<!-- Contextual Tabs for Auth Modes -->
<div class="flex gap-1 p-1 bg-surface-container-lowest rounded mb-8">
<button class="flex-1 py-2 px-4 text-xs font-label font-medium rounded transition-all bg-primary-container text-on-primary">
                    AUTHENTICATION
                </button>
<button class="flex-1 py-2 px-4 text-xs font-label font-medium rounded transition-all text-outline hover:text-on-surface hover:bg-surface-container-high">
                    WALLETS
                </button>
</div>
<!-- Auth Form -->
<form class="space-y-6">
<!-- System ID Input -->
<div class="space-y-1.5">
<label class="font-label text-[11px] uppercase tracking-wider text-outline px-1">Access Protocol ID</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-lg group-focus-within:text-primary-container transition-colors">fingerprint</span>
<input class="w-full bg-surface-container-lowest border-none pl-11 pr-4 py-3 rounded text-sm font-label focus:ring-1 focus:ring-primary-container placeholder:text-outline/30 transition-all" placeholder="CMD_USR_8821" type="text"/>
</div>
</div>
<!-- Secure Key Input -->
<div class="space-y-1.5">
<div class="flex justify-between items-center px-1">
<label class="font-label text-[11px] uppercase tracking-wider text-outline">Encryption Key</label>
<a class="font-label text-[10px] uppercase text-primary-container/60 hover:text-primary-container transition-colors" href="#">Recovery</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-lg group-focus-within:text-primary-container transition-colors">key</span>
<input class="w-full bg-surface-container-lowest border-none pl-11 pr-4 py-3 rounded text-sm font-label focus:ring-1 focus:ring-primary-container placeholder:text-outline/30 transition-all" placeholder="••••••••••••" type="password"/>
</div>
</div>
<!-- Action Controls -->
<div class="pt-4 space-y-4">
<button class="w-full py-4 bg-gradient-to-r from-primary-container to-surface-tint text-on-primary font-headline font-bold uppercase tracking-widest text-sm rounded-lg hover:brightness-110 active:scale-[0.98] transition-all" type="submit">
                        Initialize Session
                    </button>
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-outline-variant/20"></div>
<span class="flex-shrink mx-4 font-label text-[10px] text-outline/40">OR SECURE CONNECT</span>
<div class="flex-grow border-t border-outline-variant/20"></div>
</div>
<button class="w-full py-3 flex items-center justify-center gap-3 bg-surface-container-high border border-outline-variant/20 text-on-surface font-label text-xs uppercase tracking-wider rounded hover:bg-surface-variant transition-colors group" type="button">
<span class="material-symbols-outlined text-lg text-primary-container group-hover:scale-110 transition-transform">account_balance_wallet</span>
                        Connect Wallet
                    </button>
</div>
</form>
<!-- Metadata Footer inside Card -->
<div class="mt-8 flex justify-between items-center text-[10px] font-label text-outline/50 uppercase">
<div class="flex items-center gap-1.5">
<span class="w-1.5 h-1.5 rounded-full bg-primary-container animate-pulse"></span>
                    Terminal: Secure
                </div>
<span>E2EE: Verified</span>
</div>
</div>
<!-- Global System Footer -->
<footer class="mt-auto w-full max-w-4xl border-t border-outline-variant/10 pt-8 flex flex-col md:flex-row justify-between items-center gap-4 opacity-40 hover:opacity-100 transition-opacity">
<div class="font-label text-[10px] tracking-[0.2em] uppercase">
                © 2024 THE FLUID LEDGER | SYSTEM_HEALTH: OPTIMAL
            </div>
<div class="flex gap-6 font-label text-[10px] tracking-[0.1em] uppercase">
<a class="hover:text-primary-container transition-colors" href="#">Network Latency: 12ms</a>
<a class="hover:text-primary-container transition-colors" href="#">Data Feed: Live</a>
<a class="hover:text-primary-container transition-colors" href="#">Privacy Protocol</a>
</div>
</footer>
</main>
<!-- Visual Identity: Kinetic Command Branding Graphic (Asymmetric Corner) -->
<div class="fixed top-8 right-8 pointer-events-none hidden lg:block">
<div class="flex flex-col items-end">
<div class="text-[10px] font-label text-outline text-right leading-relaxed">
                LOC: SECTOR_A<br/>
                TS: 1715429302<br/>
                CMD: INIT_AUTH
            </div>
<div class="mt-4 w-12 h-1 bg-primary-container"></div>
</div>
</div>
<!-- Visual Identity: Bottom Left Abstract -->
<div class="fixed bottom-8 left-8 pointer-events-none hidden lg:block">
<div class="p-4 border-l border-b border-primary-container/20 rounded-bl-xl">
<div class="flex gap-2">
<div class="w-1 h-6 bg-primary-container/40"></div>
<div class="w-1 h-4 bg-primary-container/20 mt-2"></div>
<div class="w-1 h-8 bg-primary-container/60 -mt-2"></div>
