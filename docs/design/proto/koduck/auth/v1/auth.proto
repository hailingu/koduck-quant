// Koduck Auth Service Protocol Definition
//
// This proto defines the gRPC interface for koduck-auth service.
// HTTP REST API is kept compatible with existing Java implementation.
//
// Error handling strategy:
//   Errors are returned via gRPC Status codes, NOT in response body.
//   - UNAUTHENTICATED: Invalid credentials, expired/invalid token
//   - NOT_FOUND:       User/resource not found
//   - INVALID_ARGUMENT: Request validation failed
//   - FAILED_PRECONDITION: Account locked/disabled
//   - PERMISSION_DENIED:  Insufficient permissions
//   - INTERNAL:        Server-side error
//
//   Exception: IntrospectTokenResponse uses `active: false` per OIDC RFC 7662.
//
// Version: 1.1.0

syntax = "proto3";

package koduck.auth.v1;

option go_package = "github.com/koduck/api/go/koduck/auth/v1";
option java_package = "com.koduck.grpc.auth.v1";
option java_multiple_files = true;
option java_outer_classname = "AuthProto";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// ============================================================================
// Auth Service
// ============================================================================

// Main authentication service for token management and user authentication.
// This service handles internal service-to-service calls.
// External clients use the HTTP REST API via APISIX.
service AuthService {

  // Validates user credentials (username/email + password).
  // Used internally by login and other services requiring credential verification.
  // Returns user info on success.
  // Errors: UNAUTHENTICATED (invalid credentials), FAILED_PRECONDITION (account locked/disabled)
  rpc ValidateCredentials(ValidateCredentialsRequest)
      returns (ValidateCredentialsResponse);

  // Validates a JWT token (access or refresh).
  // Returns parsed claims on success.
  // Errors: UNAUTHENTICATED (invalid/expired token)
  rpc ValidateToken(ValidateTokenRequest)
      returns (ValidateTokenResponse);

  // Gets user information by various identifiers.
  // Errors: NOT_FOUND (user not found)
  rpc GetUser(GetUserRequest)
      returns (GetUserResponse);

  // Gets user roles and permissions.
  // Errors: NOT_FOUND (user not found)
  rpc GetUserRoles(GetUserRolesRequest)
      returns (GetUserRolesResponse);

  // Revokes a token (adds to blacklist).
  // Errors: NOT_FOUND (token not found)
  rpc RevokeToken(RevokeTokenRequest)
      returns (google.protobuf.Empty);

  // Logs out a user by revoking their refresh token.
  // Matches REST POST /api/v1/auth/logout semantics.
  rpc Logout(LogoutRequest)
      returns (google.protobuf.Empty);

  // Gets security configuration (captcha, OAuth, registration settings).
  // Used by frontend and other services to dynamically configure security features.
  rpc GetSecurityConfig(google.protobuf.Empty)
      returns (SecurityConfigResponse);

  // Gets JWKS (JSON Web Key Set) for token verification.
  rpc GetJwks(google.protobuf.Empty)
      returns (JwksResponse);

  // Health check for service status.
  rpc HealthCheck(google.protobuf.Empty)
      returns (HealthCheckResponse);
}

// ============================================================================
// Token Service
// ============================================================================

// Token introspection and refresh service.
service TokenService {

  // Introspects an access token (OIDC RFC 7662 compatible).
  // Returns active=true with claims, or active=false per OIDC spec.
  // Note: This RPC does NOT use gRPC Status for "token inactive" —
  // it returns active=false in the response body per RFC 7662.
  rpc IntrospectAccessToken(IntrospectTokenRequest)
      returns (IntrospectTokenResponse);

  // Refreshes an access token using a refresh token.
  // Returns new token pair on success.
  // Errors: UNAUTHENTICATED (invalid/expired refresh token)
  rpc RefreshToken(RefreshTokenRequest)
      returns (RefreshTokenResponse);

  // Generates a new token pair (internal use only).
  rpc GenerateTokenPair(GenerateTokenPairRequest)
      returns (GenerateTokenPairResponse);
}

// ============================================================================
// Request Messages
// ============================================================================

message ValidateCredentialsRequest {
  // Username or email address
  string username = 1;

  // Plain text password (will be hashed and compared)
  string password = 2;

  // Client IP address for audit logging
  string ip_address = 3;

  // User agent string
  string user_agent = 4;
}

message ValidateTokenRequest {
  // The JWT token to validate
  string token = 1;

  // Expected token type (optional validation)
  TokenType token_type = 2;
}

message GetUserRequest {
  // One of the following identifiers must be provided
  oneof identifier {
    int64 user_id = 1;
    string username = 2;
    string email = 3;
  }
}

message GetUserRolesRequest {
  int64 user_id = 1;
}

message RevokeTokenRequest {
  // The token to revoke
  string token = 1;

  // Token type determines which blacklist to use
  TokenType token_type = 2;

  // User ID for audit logging
  int64 user_id = 3;

  // Reason for revocation
  string reason = 4;
}

message LogoutRequest {
  // Refresh token to revoke (optional; if omitted, all sessions for the user are revoked)
  string refresh_token = 1;

  // User ID for audit logging
  int64 user_id = 2;
}

message IntrospectTokenRequest {
  // The token to introspect
  string token = 1;

  // Optional: token type hint ("access_token" or "refresh_token")
  string token_type_hint = 2;
}

message RefreshTokenRequest {
  // The refresh token
  string refresh_token = 1;

  // Optional: IP address for audit
  string ip_address = 2;

  // Optional: device info for audit
  string device_info = 3;
}

message GenerateTokenPairRequest {
  int64 user_id = 1;
  string username = 2;
  string email = 3;
  repeated string roles = 4;

  // Optional: custom claims
  map<string, string> custom_claims = 5;

  // Token lifetime override (seconds)
  optional int64 access_token_ttl = 6;
  optional int64 refresh_token_ttl = 7;
}

// ============================================================================
// Response Messages
// ============================================================================

message ValidateCredentialsResponse {
  UserInfo user = 1;
  repeated string roles = 2;
}

message ValidateTokenResponse {
  int64 user_id = 1;
  string username = 2;
  string email = 3;
  repeated string roles = 4;
  google.protobuf.Timestamp expires_at = 5;

  // Token metadata
  string token_id = 6;
  google.protobuf.Timestamp issued_at = 7;
}

message GetUserResponse {
  UserInfo user = 1;
  repeated string roles = 2;
}

message GetUserRolesResponse {
  int64 user_id = 1;
  repeated string roles = 2;
  repeated Permission permissions = 3;
}

message IntrospectTokenResponse {
  // Whether the token is active (OIDC RFC 7662 compliant).
  // When false, only this field is meaningful; other fields may be omitted.
  bool active = 1;

  // Scope of the token (space-separated)
  string scope = 2;

  // Client ID (if applicable)
  string client_id = 3;

  // Token owner
  string username = 4;
  int64 user_id = 5;
  string email = 6;

  // Token type (e.g., "Bearer")
  string token_type = 7;

  // Expiration time
  google.protobuf.Timestamp exp = 8;

  // Issue time
  google.protobuf.Timestamp iat = 9;

  // Not before time
  google.protobuf.Timestamp nbf = 10;

  // Subject
  string sub = 11;

  // Audience
  repeated string aud = 12;

  // Issuer
  string iss = 13;

  // JWT ID
  string jti = 14;
}

message RefreshTokenResponse {
  // New token pair
  string access_token = 1;
  string refresh_token = 2;

  // Token metadata
  string token_type = 3;
  int64 expires_in = 4;  // seconds
  google.protobuf.Timestamp expires_at = 5;

  // User info
  UserInfo user = 6;
}

message GenerateTokenPairResponse {
  string access_token = 1;
  string refresh_token = 2;
  string token_type = 3;
  int64 expires_in = 4;  // seconds
  google.protobuf.Timestamp expires_at = 5;
}

message JwksResponse {
  repeated Jwk keys = 1;
}

message HealthCheckResponse {
  enum ServingStatus {
    UNKNOWN = 0;
    SERVING = 1;
    NOT_SERVING = 2;
    SERVICE_UNKNOWN = 3;  // Used only by the Watch method.
  }
  ServingStatus status = 1;

  // Additional health details
  string version = 2;
  google.protobuf.Timestamp timestamp = 3;
  map<string, string> details = 4;
}

message SecurityConfigResponse {
  // Whether Turnstile captcha is enabled
  bool turnstile_enabled = 1;

  // Turnstile site key (public)
  string turnstile_site_key = 2;

  // Whether user registration is enabled
  bool registration_enabled = 3;

  // Whether Google OAuth is enabled
  bool oauth_google_enabled = 4;

  // Whether GitHub OAuth is enabled
  bool oauth_github_enabled = 5;
}

// ============================================================================
// Data Types
// ============================================================================

message UserInfo {
  int64 id = 1;
  string username = 2;
  string email = 3;
  string nickname = 4;
  string avatar_url = 5;
  UserStatus status = 6;
  bool email_verified = 7;
  google.protobuf.Timestamp last_login_at = 8;
  google.protobuf.Timestamp created_at = 9;
}

message Permission {
  int32 id = 1;
  string code = 2;      // e.g., "user:read", "user:write"
  string name = 3;      // Human-readable name
  string resource = 4;  // Resource type (e.g., "user", "role")
  string action = 5;    // Action (e.g., "read", "write", "delete")
  string description = 6;
}

// JWK (JSON Web Key) per RFC 7517.
// Note: The `x5t_s256` field uses underscore naming in proto. The application
// layer must map it to `x5t#S256` when serving the HTTP JWKS endpoint
// (/.well-known/jwks.json), as the JWK spec requires the `#` character.
message Jwk {
  // Key type ("RSA")
  string kty = 1;

  // Key ID
  string kid = 2;

  // Key usage ("sig" for signing)
  string use = 3;

  // RSA modulus (Base64URL encoded)
  string n = 4;

  // RSA exponent (Base64URL encoded)
  string e = 5;

  // Algorithm ("RS256")
  string alg = 6;

  // Key operations
  repeated string key_ops = 7;

  // X.509 Certificate SHA-1 thumbprint (Base64URL encoded)
  string x5t = 8;

  // X.509 Certificate SHA-256 thumbprint (Base64URL encoded).
  // Maps to JWK field name "x5t#S256" in JSON output.
  string x5t_s256 = 9;
}

// ============================================================================
// Enums
// ============================================================================

enum TokenType {
  TOKEN_TYPE_UNSPECIFIED = 0;
  ACCESS_TOKEN = 1;
  REFRESH_TOKEN = 2;
}

enum UserStatus {
  USER_STATUS_UNSPECIFIED = 0;
  ACTIVE = 1;
  DISABLED = 2;
  PENDING = 3;
  SUSPENDED = 4;
}
