[app]
name = "koduck-memory"
env = "dev"
version = ""

[server]
grpc_addr = "0.0.0.0:50051"
metrics_addr = "0.0.0.0:9090"

[postgres]
dsn = ""

[object_store]
endpoint = ""
bucket = ""
access_key = ""
secret_key = ""
region = ""

[index]
mode = "domain-first"

[capabilities]
ttl_secs = 60

[summary]
async_enabled = true
llm_enabled = false
llm_provider = "minimax"
llm_api_key = ""
llm_base_url = "https://api.minimax.chat/v1"
llm_model = "MiniMax-M2.5"
llm_timeout_ms = 15000
llm_max_concurrency = 1

[retry]
max_attempts = 3
initial_delay_ms = 500
