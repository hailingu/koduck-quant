syntax = "proto3";

package koduck.memory.v1;

import "koduck/contract/v1/shared.proto";

option go_package = "github.com/hailingu/koduck-quant/proto/koduck/memory/v1;memoryv1";

// This proto is the frozen long-lived southbound contract between koduck-ai
// and koduck-memory for V1. Existing tag numbers must remain stable.
service MemoryService {
  rpc GetCapabilities(koduck.contract.v1.RequestMeta) returns (koduck.contract.v1.Capability);
  rpc GetCategoryCatalog(GetCategoryCatalogRequest) returns (GetCategoryCatalogResponse);
  rpc UpsertSessionMeta(UpsertSessionMetaRequest) returns (UpsertSessionMetaResponse);
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse);
  rpc GetSessionTranscript(GetSessionTranscriptRequest) returns (GetSessionTranscriptResponse);
  rpc GetSessionSummary(GetSessionSummaryRequest) returns (GetSessionSummaryResponse);
  rpc GetAllSessionIds(GetAllSessionIdsRequest) returns (GetSessionIdsLookupResponse);
  rpc GetSessionIdsByDomainClass(GetSessionIdsByDomainClassRequest) returns (GetSessionIdsLookupResponse);
  rpc GetSessionIdsByNer(GetSessionIdsByNerRequest) returns (GetSessionIdsLookupResponse);
  rpc GetSessionIdsByIntentType(GetSessionIdsByIntentTypeRequest) returns (GetSessionIdsLookupResponse);
  rpc QueryMemory(QueryMemoryRequest) returns (QueryMemoryResponse);
  rpc AppendMemory(AppendMemoryRequest) returns (AppendMemoryResponse);
  rpc SummarizeMemory(SummarizeMemoryRequest) returns (SummarizeMemoryResponse);
  rpc CreatePlan(CreatePlanRequest) returns (CreatePlanResponse);
  rpc AppendPlanEvent(AppendPlanEventRequest) returns (AppendPlanEventResponse);
  rpc ListPlanEvents(ListPlanEventsRequest) returns (ListPlanEventsResponse);
  rpc SavePlanSnapshot(SavePlanSnapshotRequest) returns (SavePlanSnapshotResponse);
  rpc GetLatestPlanSnapshot(GetLatestPlanSnapshotRequest) returns (GetLatestPlanSnapshotResponse);
  rpc SavePlanArtifact(SavePlanArtifactRequest) returns (SavePlanArtifactResponse);
  rpc CreateEditProposal(CreateEditProposalRequest) returns (CreateEditProposalResponse);
  rpc ReviewEditProposal(ReviewEditProposalRequest) returns (ReviewEditProposalResponse);
  rpc DeleteSession(DeleteSessionRequest) returns (DeleteSessionResponse);
  rpc DeleteMemoryEntry(DeleteMemoryEntryRequest) returns (DeleteMemoryEntryResponse);
}

message UpsertSessionMetaRequest {
  koduck.contract.v1.RequestMeta meta = 1;
  string session_id = 2;
  string title = 3;
  string status = 4;
  map<string, string> extra = 5;
  string parent_session_id = 6;
  string forked_from_session_id = 7;
  int64 last_message_at = 8;

  reserved 9 to 19;
}

message GetCategoryCatalogRequest {
  koduck.contract.v1.RequestMeta meta = 1;

  reserved 2 to 19;
}

message GetCategoryCatalogResponse {
  bool ok = 1;
  repeated string domain_categories = 2;
  repeated string ner_categories = 3;
  repeated string intent_categories = 4;
  koduck.contract.v1.ErrorDetail error = 5;
}

message UpsertSessionMetaResponse {
  bool ok = 1;
  koduck.contract.v1.ErrorDetail error = 2;
}

message GetSessionRequest {
  koduck.contract.v1.RequestMeta meta = 1;
  string session_id = 2;

  reserved 3 to 19;
}

message GetSessionResponse {
  bool ok = 1;
  SessionInfo session = 2;
  koduck.contract.v1.ErrorDetail error = 3;
}

message GetSessionTranscriptRequest {
  koduck.contract.v1.RequestMeta meta = 1;
  string session_id = 2;

  reserved 3 to 19;
}

message GetSessionTranscriptResponse {
  bool ok = 1;
  repeated SessionTranscriptEntry entries = 2;
  string transcript_text = 3;
  koduck.contract.v1.ErrorDetail error = 4;
}

message GetSessionSummaryRequest {
  koduck.contract.v1.RequestMeta meta = 1;
  string session_id = 2;

  reserved 3 to 19;
}

message GetSessionSummaryResponse {
  bool ok = 1;
  string summary = 2;
  koduck.contract.v1.ErrorDetail error = 3;
}

message GetAllSessionIdsRequest {
  koduck.contract.v1.RequestMeta meta = 1;

  reserved 2 to 19;
}

message GetSessionIdsByDomainClassRequest {
  koduck.contract.v1.RequestMeta meta = 1;
  string domain_class = 2;

  reserved 3 to 19;
}

message GetSessionIdsByNerRequest {
  koduck.contract.v1.RequestMeta meta = 1;
  string ner = 2;

  reserved 3 to 19;
}

message GetSessionIdsByIntentTypeRequest {
  koduck.contract.v1.RequestMeta meta = 1;
  string intent_type = 2;

  reserved 3 to 19;
}

message GetSessionIdsLookupResponse {
  bool ok = 1;
  repeated string session_ids = 2;
  koduck.contract.v1.ErrorDetail error = 3;
}

message QueryMemoryRequest {
  koduck.contract.v1.RequestMeta meta = 1;
  string query_text = 2;
  string session_id = 3;
  string domain_class = 4;
  int32 top_k = 5;
  RetrievePolicy retrieve_policy = 6;
  string page_token = 7;
  int32 page_size = 8;
  QueryIntent query_intent = 20;

  reserved 9 to 19;
}

message QueryMemoryResponse {
  bool ok = 1;
  repeated MemoryHit hits = 2;
  string next_page_token = 3;
  koduck.contract.v1.ErrorDetail error = 4;
}

message AppendMemoryRequest {
  koduck.contract.v1.RequestMeta meta = 1;
  string session_id = 2;
  repeated MemoryEntry entries = 3;

  reserved 4 to 19;
}

message AppendMemoryResponse {
  bool ok = 1;
  int32 appended_count = 2;
  koduck.contract.v1.ErrorDetail error = 3;
}

message SummarizeMemoryRequest {
  koduck.contract.v1.RequestMeta meta = 1;
  string session_id = 2;
  string strategy = 3;

  reserved 4 to 19;
}

message SummarizeMemoryResponse {
  bool ok = 1;
  string summary = 2;
  koduck.contract.v1.ErrorDetail error = 3;
}

message CreatePlanRequest {
  koduck.contract.v1.RequestMeta meta = 1;
  string session_id = 2;
  string plan_id = 3;
  string goal = 4;
  string status = 5;
  string created_by = 6;

  reserved 7 to 19;
}

message CreatePlanResponse {
  bool ok = 1;
  PlanInfo plan = 2;
  koduck.contract.v1.ErrorDetail error = 3;
}

message AppendPlanEventRequest {
  koduck.contract.v1.RequestMeta meta = 1;
  string session_id = 2;
  string plan_id = 3;
  string event_id = 4;
  int64 sequence_num = 5;
  string event_type = 6;
  string payload_json = 7;

  reserved 8 to 19;
}

message AppendPlanEventResponse {
  bool ok = 1;
  PlanEventInfo event = 2;
  koduck.contract.v1.ErrorDetail error = 3;
}

message ListPlanEventsRequest {
  koduck.contract.v1.RequestMeta meta = 1;
  string session_id = 2;
  string plan_id = 3;

  reserved 4 to 19;
}

message ListPlanEventsResponse {
  bool ok = 1;
  repeated PlanEventInfo events = 2;
  koduck.contract.v1.ErrorDetail error = 3;
}

message SavePlanSnapshotRequest {
  koduck.contract.v1.RequestMeta meta = 1;
  string session_id = 2;
  string plan_id = 3;
  string snapshot_id = 4;
  int64 version = 5;
  string state_json = 6;

  reserved 7 to 19;
}

message SavePlanSnapshotResponse {
  bool ok = 1;
  PlanSnapshotInfo snapshot = 2;
  koduck.contract.v1.ErrorDetail error = 3;
}

message GetLatestPlanSnapshotRequest {
  koduck.contract.v1.RequestMeta meta = 1;
  string session_id = 2;
  string plan_id = 3;

  reserved 4 to 19;
}

message GetLatestPlanSnapshotResponse {
  bool ok = 1;
  PlanSnapshotInfo snapshot = 2;
  koduck.contract.v1.ErrorDetail error = 3;
}

message SavePlanArtifactRequest {
  koduck.contract.v1.RequestMeta meta = 1;
  string session_id = 2;
  string plan_id = 3;
  string artifact_id = 4;
  string node_id = 5;
  string artifact_type = 6;
  string content_json = 7;
  string object_uri = 8;

  reserved 9 to 19;
}

message SavePlanArtifactResponse {
  bool ok = 1;
  PlanArtifactInfo artifact = 2;
  koduck.contract.v1.ErrorDetail error = 3;
}

message CreateEditProposalRequest {
  koduck.contract.v1.RequestMeta meta = 1;
  string session_id = 2;
  string plan_id = 3;
  string proposal_id = 4;
  string node_id = 5;
  string target_kind = 6;
  string operation = 7;
  string target_ref = 8;
  string before_json = 9;
  string after_json = 10;
  string reason = 11;
  double confidence = 12;
  string created_by = 13;

  reserved 14 to 19;
}

message CreateEditProposalResponse {
  bool ok = 1;
  EditProposalInfo proposal = 2;
  koduck.contract.v1.ErrorDetail error = 3;
}

message ReviewEditProposalRequest {
  koduck.contract.v1.RequestMeta meta = 1;
  string session_id = 2;
  string proposal_id = 3;
  string status = 4;
  string reviewed_by = 5;
  string after_json = 6;
  bool applied = 7;

  reserved 8 to 19;
}

message ReviewEditProposalResponse {
  bool ok = 1;
  EditProposalInfo proposal = 2;
  koduck.contract.v1.ErrorDetail error = 3;
}

message PlanInfo {
  string plan_id = 1;
  string tenant_id = 2;
  string session_id = 3;
  string request_id = 4;
  string goal = 5;
  string status = 6;
  string created_by = 7;
  int64 created_at = 8;
  int64 updated_at = 9;

  reserved 10 to 19;
}

message PlanEventInfo {
  string event_id = 1;
  string tenant_id = 2;
  string session_id = 3;
  string plan_id = 4;
  int64 sequence_num = 5;
  string event_type = 6;
  string payload_json = 7;
  int64 created_at = 8;

  reserved 9 to 19;
}

message PlanSnapshotInfo {
  string snapshot_id = 1;
  string tenant_id = 2;
  string session_id = 3;
  string plan_id = 4;
  int64 version = 5;
  string state_json = 6;
  int64 created_at = 7;

  reserved 8 to 19;
}

message PlanArtifactInfo {
  string artifact_id = 1;
  string tenant_id = 2;
  string session_id = 3;
  string plan_id = 4;
  string node_id = 5;
  string artifact_type = 6;
  string content_json = 7;
  string object_uri = 8;
  int64 created_at = 9;

  reserved 10 to 19;
}

message EditProposalInfo {
  string proposal_id = 1;
  string tenant_id = 2;
  string session_id = 3;
  string plan_id = 4;
  string node_id = 5;
  string target_kind = 6;
  string operation = 7;
  string target_ref = 8;
  string before_json = 9;
  string after_json = 10;
  string reason = 11;
  double confidence = 12;
  string status = 13;
  string created_by = 14;
  string reviewed_by = 15;
  int64 created_at = 16;
  int64 reviewed_at = 17;
  int64 applied_at = 18;

  reserved 19;
}

message DeleteSessionRequest {
  koduck.contract.v1.RequestMeta meta = 1;
  string session_id = 2;

  reserved 3 to 19;
}

message DeleteSessionResponse {
  bool ok = 1;
  int32 deleted_facts = 2;
  int32 deleted_units = 3;
  int32 deleted_anchors = 4;
  int32 deleted_entries = 5;
  int32 deleted_summaries = 6;
  int32 deleted_index_records = 7;
  koduck.contract.v1.ErrorDetail error = 8;
}

message DeleteMemoryEntryRequest {
  koduck.contract.v1.RequestMeta meta = 1;
  string session_id = 2;
  string entry_id = 3;

  reserved 4 to 19;
}

message DeleteMemoryEntryResponse {
  bool ok = 1;
  bool deleted = 2;
  int32 remaining_entries = 3;
  koduck.contract.v1.ErrorDetail error = 4;
}

message SessionInfo {
  string session_id = 1;
  string tenant_id = 2;
  string user_id = 3;
  string parent_session_id = 4;
  string forked_from_session_id = 5;
  string title = 6;
  string status = 7;
  int64 created_at = 8;
  int64 updated_at = 9;
  int64 last_message_at = 10;
  map<string, string> extra = 11;

  reserved 12 to 19;
}

message MemoryHit {
  string session_id = 1;
  string l0_uri = 2;
  float score = 3;
  repeated string match_reasons = 4;
  string snippet = 5;

  reserved 6 to 19;
}

message MemoryEntry {
  string role = 1;
  string content = 2;
  int64 timestamp = 3;
  map<string, string> metadata = 4;

  reserved 5 to 19;
}

message SessionTranscriptEntry {
  string entry_id = 1;
  string role = 2;
  string content = 3;
  int64 timestamp = 4;
  int64 sequence_num = 5;
  map<string, string> metadata = 6;
  string l0_uri = 7;

  reserved 8 to 19;
}

enum RetrievePolicy {
  RETRIEVE_POLICY_UNSPECIFIED = 0;
  RETRIEVE_POLICY_DOMAIN_FIRST = 1;
  RETRIEVE_POLICY_SUMMARY_FIRST = 2;
  RETRIEVE_POLICY_HYBRID = 3;

  reserved 4 to 19;
}

enum QueryIntent {
  QUERY_INTENT_UNSPECIFIED = 0;
  QUERY_INTENT_RECALL = 1;
  QUERY_INTENT_COMPARE = 2;
  QUERY_INTENT_DISAMBIGUATE = 3;
  QUERY_INTENT_CORRECT = 4;
  QUERY_INTENT_EXPLAIN = 5;
  QUERY_INTENT_DECIDE = 6;
  QUERY_INTENT_NONE = 7;
  QUERY_INTENT_DELETE = 8;

  reserved 9 to 19;
}
