version: '3.8'

services:
  # PostgreSQL for koduck-auth
  postgres:
    image: postgres:15-alpine
    container_name: koduck-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: koduck_auth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for koduck-auth
  redis:
    image: redis:7-alpine
    container_name: koduck-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Koduck Auth Service
  koduck-auth:
    build:
      context: ./koduck-auth
      dockerfile: Dockerfile
    container_name: koduck-auth
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KODUCK_AUTH__SERVER__HTTP_ADDR: "0.0.0.0:8081"
      KODUCK_AUTH__SERVER__GRPC_ADDR: "0.0.0.0:50051"
      KODUCK_AUTH__DATABASE__URL: "postgresql://postgres:postgres@postgres:5432/koduck_auth"
      KODUCK_AUTH__REDIS__URL: "redis://redis:6379"
      KODUCK_AUTH__JWT__PRIVATE_KEY_PATH: "/app/keys/private.pem"
      KODUCK_AUTH__JWT__PUBLIC_KEY_PATH: "/app/keys/public.pem"
      RUST_LOG: "debug"
    ports:
      - "8081:8081"
      - "50051:50051"
      - "9090:9090"
    volumes:
      - ./koduck-auth/keys:/app/keys:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
