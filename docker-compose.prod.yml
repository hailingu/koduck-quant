version: '3.8'

# ==========================================
# Production Docker Compose Configuration
# ==========================================
# Usage: docker-compose -f docker-compose.prod.yml up -d

services:
  # PostgreSQL Database
  postgresql:
    image: postgres:15-alpine
    container_name: koduck-postgresql-prod
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    restart: always
    networks:
      - koduck-prod-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: koduck-redis-prod
    ports:
      - "6379:6379"
    volumes:
      - redis_prod_data:/data
    restart: always
    networks:
      - koduck-prod-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # Python Data Service
  data-service:
    build:
      context: ./koduck-data-service
      dockerfile: Dockerfile
    container_name: koduck-data-service-prod
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=WARNING
      - DEBUG=false
      # Eastmoney Client Settings
      - EASTMONEY_COOKIE_TTL=3600
      - EASTMONEY_MIN_REQUEST_INTERVAL=3.0
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    networks:
      - koduck-prod-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  # Java Backend
  backend:
    build:
      context: ./koduck-backend
      dockerfile: Dockerfile
    container_name: koduck-backend-prod
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=postgresql
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB}
      - DB_USERNAME=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATA_SERVICE_URL=http://data-service:8000/api/v1
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      data-service:
        condition: service_healthy
    restart: always
    networks:
      - koduck-prod-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Frontend with Nginx
  frontend:
    build:
      context: ./koduck-frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=
    container_name: koduck-frontend-prod
    ports:
      - "3000:80"
    environment:
      - NGINX_BACKEND_URL=http://backend:8080
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    networks:
      - koduck-prod-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

volumes:
  postgres_prod_data:
    driver: local
  redis_prod_data:
    driver: local

networks:
  koduck-prod-network:
    driver: bridge
    name: koduck-prod-network
