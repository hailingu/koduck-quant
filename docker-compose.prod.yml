# ==========================================
# Production Docker Compose Configuration
# ==========================================
# Usage: docker-compose -f docker-compose.prod.yml up -d

services:
  # PostgreSQL Database
  postgresql:
    image: postgres:15-alpine
    container_name: koduck-postgresql-prod
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-koduck_prod}
      POSTGRES_USER: ${POSTGRES_USER:-koduck}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-postgres-password}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    restart: always
    networks:
      - koduck-prod-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-koduck} -d ${POSTGRES_DB:-koduck_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: koduck-redis-prod
    ports:
      - "6379:6379"
    volumes:
      - redis_prod_data:/data
    restart: always
    networks:
      - koduck-prod-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: koduck-rabbitmq-prod
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    restart: always
    networks:
      - koduck-prod-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # Python Data Service
  data-service:
    build:
      context: ./koduck-data-service
      dockerfile: Dockerfile
      args:
        - PIP_INDEX_URL=${PIP_INDEX_URL:-https://pypi.org/simple}
    container_name: koduck-data-service-prod
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - REDIS_URL=redis://redis:6379/0
      - PRICE_PUSH_MQ_ENABLED=true
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME:-guest}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-guest}
      - RABBITMQ_VHOST=${RABBITMQ_VHOST:-/}
      - LOG_LEVEL=WARNING
      - DEBUG=false
      # Eastmoney Client Settings
      - EASTMONEY_COOKIE_TTL=3600
      - EASTMONEY_MIN_REQUEST_INTERVAL=3.0
      # Timezone for scheduled tasks (market hours in Shanghai)
      - TZ=Asia/Shanghai
      # K-line scheduler configuration
      - KLINE_CHECK_INTERVAL=3600
      - KLINE_UPDATE_TIME=15:35
    volumes:
      # Mount K-line data for persistence (rw: container can update CSV)
      - ./koduck-data-service/data:/app/data
      # Mount logs directory
      - ./koduck-data-service/logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: always
    networks:
      - koduck-prod-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  # Java Backend
  backend:
    build:
      context: ./koduck-backend
      dockerfile: Dockerfile
    container_name: koduck-backend-prod
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=postgresql
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-koduck_prod}
      - DB_USERNAME=${POSTGRES_USER:-koduck}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-change-me-postgres-password}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATA_SERVICE_URL=http://data-service:8000/api/v1
      - RATE_LIMIT_LOGIN_FAILURE_MAX_PER_USER=${RATE_LIMIT_LOGIN_FAILURE_MAX_PER_USER:-5}
      - RATE_LIMIT_LOGIN_FAILURE_MAX_PER_IP=${RATE_LIMIT_LOGIN_FAILURE_MAX_PER_IP:-20}
      - RATE_LIMIT_LOGIN_FAILURE_WINDOW=${RATE_LIMIT_LOGIN_FAILURE_WINDOW:-15m}
      - RATE_LIMIT_PASSWORD_RESET_MAX_PER_USER=${RATE_LIMIT_PASSWORD_RESET_MAX_PER_USER:-3}
      - RATE_LIMIT_PASSWORD_RESET_MAX_PER_EMAIL=${RATE_LIMIT_PASSWORD_RESET_MAX_PER_EMAIL:-5}
      - RATE_LIMIT_PASSWORD_RESET_MAX_PER_IP=${RATE_LIMIT_PASSWORD_RESET_MAX_PER_IP:-10}
      - RATE_LIMIT_PASSWORD_RESET_WINDOW=${RATE_LIMIT_PASSWORD_RESET_WINDOW:-1h}
      - PRICE_PUSH_MQ_ENABLED=true
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME:-guest}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-guest}
      - RABBITMQ_VHOST=${RABBITMQ_VHOST:-/}
      - JWT_SECRET=${JWT_SECRET:-change-me-jwt-secret-at-least-32-characters}
      - DEFAULT_LLM_PROVIDER=${DEFAULT_LLM_PROVIDER:-minimax}
      - LLM_PROVIDER=${LLM_PROVIDER:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - LLM_API_BASE=${LLM_API_BASE:-https://api.gptsapi.net}
      - OPENAI_API_BASE=${OPENAI_API_BASE:-https://api.openai.com/v1}
      - MINIMAX_API_BASE=${MINIMAX_API_BASE:-https://api.minimax.chat/v1}
      - DEEPSEEK_API_BASE=${DEEPSEEK_API_BASE:-https://api.deepseek.com/v1}
      # Finnhub US Stock API
      - FINNHUB_ENABLED=${FINNHUB_ENABLED:-true}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY:-}
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      data-service:
        condition: service_healthy
    restart: always
    networks:
      - koduck-prod-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Koduck Agent - LLM API Gateway
  agent:
    build:
      context: ./koduck-agent
      dockerfile: Dockerfile
    container_name: koduck-agent-prod
    ports:
      - "8001:8000"
    environment:
      - GPT_API_KEY=${GPT_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - POSTGRES_HOST=postgresql
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-koduck_prod}
      - POSTGRES_USER=${POSTGRES_USER:-koduck}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change-me-postgres-password}
      - MEMORY_DATABASE_URL=postgresql://${POSTGRES_USER:-koduck}:${POSTGRES_PASSWORD:-change-me-postgres-password}@postgresql:5432/${POSTGRES_DB:-koduck_prod}
      - KODUCK_KLINE_DATABASE_URL=postgresql://${POSTGRES_USER:-koduck}:${POSTGRES_PASSWORD:-change-me-postgres-password}@postgresql:5432/${POSTGRES_DB:-koduck_prod}
      - LLM_API_BASE=${LLM_API_BASE:-https://api.gptsapi.net}
      - OPENAI_API_BASE=${OPENAI_API_BASE:-https://api.openai.com/v1}
      - MINIMAX_API_BASE=${MINIMAX_API_BASE:-https://api.minimax.chat/v1}
      - DEEPSEEK_API_BASE=${DEEPSEEK_API_BASE:-https://api.deepseek.com/v1}
      - LOG_LEVEL=WARNING
    restart: always
    networks:
      - koduck-prod-network
    depends_on:
      postgresql:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health', timeout=5.0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  # Frontend with Nginx
  frontend:
    build:
      context: ./koduck-frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=
    container_name: koduck-frontend-prod
    ports:
      - "3000:80"
    environment:
      - NGINX_BACKEND_URL=http://backend:8080
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    networks:
      - koduck-prod-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

volumes:
  postgres_prod_data:
    driver: local
  redis_prod_data:
    driver: local

networks:
  koduck-prod-network:
    driver: bridge
    name: koduck-prod-network
