name: Dev CI

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

permissions:
  contents: read

concurrency:
  group: dev-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changed Modules
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'koduck-backend/**'
            frontend:
              - 'koduck-frontend/**'

  backend-unit-tests:
    name: Backend Unit Tests (Java 23)
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "23"
          cache: maven

      - name: Run backend checkstyle
        run: |
          set -euo pipefail
          mvn -f koduck-backend/pom.xml -B checkstyle:check

      - name: Run backend tests
        run: |
          set -euo pipefail
          mvn -f koduck-backend/pom.xml -B clean test -DskipITs

      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dev-backend-surefire-reports-${{ github.run_id }}
          path: koduck-backend/target/surefire-reports/
          if-no-files-found: ignore

      - name: Upload backend coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dev-backend-jacoco-report-${{ github.run_id }}
          path: koduck-backend/target/site/jacoco/
          if-no-files-found: ignore

  frontend-quality:
    name: Frontend Lint & Build (Node 22)
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: koduck-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: koduck-frontend/package-lock.json

      - name: Install dependencies
        run: |
          set -euo pipefail
          npm ci

      - name: Run lint
        run: |
          set -euo pipefail
          npm run lint

      - name: Run build
        run: |
          set -euo pipefail
          npm run build
