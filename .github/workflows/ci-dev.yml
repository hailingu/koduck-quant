name: Dev CI

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

permissions:
  contents: read

concurrency:
  group: dev-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-unit-tests:
    name: Backend Unit Tests (Java 23)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "23"
          cache: maven

      - name: Run backend tests
        run: |
          set -euo pipefail
          mvn -f koduck-backend/pom.xml -B clean test -DskipITs

      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dev-backend-surefire-reports-${{ github.run_id }}
          path: koduck-backend/target/surefire-reports/
          if-no-files-found: ignore

  data-service-tests:
    name: Data Service Tests (Python 3.13)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: koduck-data-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            koduck-data-service/requirements.txt
            koduck-data-service/pyproject.toml

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run data service tests
        run: |
          set -euo pipefail
          pytest -q tests

  frontend-quality:
    name: Frontend Lint & Build (Node 22)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: koduck-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: koduck-frontend/package-lock.json

      - name: Install dependencies
        run: |
          set -euo pipefail
          npm ci

      - name: Run lint
        run: |
          set -euo pipefail
          npm run lint

      - name: Run build
        run: |
          set -euo pipefail
          npm run build
