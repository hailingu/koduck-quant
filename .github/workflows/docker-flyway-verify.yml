name: Docker Flyway Migration Verify

on:
  push:
    branches:
      - dev
      - main
    paths:
      - 'koduck-backend/src/main/resources/db/migration/**'
  pull_request:
    branches:
      - dev
      - main
    paths:
      - 'koduck-backend/src/main/resources/db/migration/**'

permissions:
  contents: read

jobs:
  verify-flyway-migrations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./koduck-backend
          push: false
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract and verify Flyway migrations
        run: |
          set -euo pipefail
          
          IMAGE_NAME="koduck-backend-test:${{ github.sha }}"
          
          # Get list of migration files from source
          echo "=== Source migration files ==="
          find koduck-backend/src/main/resources/db/migration -name "V*.sql" -type f | sort
          
          # Extract JAR from image
          echo ""
          echo "=== Extracting JAR from Docker image ==="
          docker create --name temp-extract $IMAGE_NAME
          docker cp temp-extract:/app/app.jar ./app.jar
          docker rm temp-extract
          
          # Extract migrations from JAR
          echo ""
          echo "=== Extracting migrations from JAR ==="
          mkdir -p extracted-migrations
          unzip -p app.jar BOOT-INF/classes/db/migration/*.sql > /dev/null 2>&1 || true
          
          # List files in JAR's migration folder
          echo "Migration files in JAR:"
          unzip -l app.jar | grep "db/migration/V.*\.sql" || echo "No migration files found in JAR"
          
          # Verify each migration file
          echo ""
          echo "=== Verifying migration files ==="
          
          for sql_file in koduck-backend/src/main/resources/db/migration/V*.sql; do
            filename=$(basename "$sql_file")
            
            # Extract from JAR
            if unzip -p app.jar "BOOT-INF/classes/db/migration/$filename" > "extracted-migrations/$filename" 2>/dev/null; then
              # Calculate checksums
              src_md5=$(md5sum "$sql_file" | awk '{print $1}')
              extracted_md5=$(md5sum "extracted-migrations/$filename" | awk '{print $1}')
              
              echo "File: $filename"
              echo "  Source MD5:  $src_md5"
              echo "  Extracted:   $extracted_md5"
              
              if [[ "$src_md5" != "$extracted_md5" ]]; then
                echo "  ❌ MISMATCH!"
                echo ""
                echo "Source content:"
                head -5 "$sql_file"
                echo ""
                echo "Extracted content:"
                head -5 "extracted-migrations/$filename"
                exit 1
              else
                echo "  ✅ OK"
              fi
            else
              echo "File: $filename - ❌ NOT FOUND IN JAR"
              exit 1
            fi
          done
          
          echo ""
          echo "✅ All migration files verified successfully!"

      - name: Cleanup
        if: always()
        run: |
          rm -rf app.jar extracted-migrations
          docker rm -f temp-extract 2>/dev/null || true
