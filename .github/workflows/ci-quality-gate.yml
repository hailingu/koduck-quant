name: CI Quality Gate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-quality-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changed Modules
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      data_service: ${{ steps.filter.outputs.data_service }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'koduck-backend/**'
            data_service:
              - 'koduck-data-service/**'

  backend-unit-tests:
    name: Backend Unit Tests (Java 23)
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "23"
          cache: maven

      - name: Run backend tests
        run: |
          set -euo pipefail
          mvn -f koduck-backend/pom.xml -B clean test \
            -DskipITs \
            -Dsurefire.rerunFailingTestsCount=2

      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-surefire-reports-${{ github.run_id }}
          path: koduck-backend/target/surefire-reports/
          if-no-files-found: ignore

  data-service-tests:
    name: Data Service Tests (Python 3.13)
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.data_service == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: koduck-data-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            koduck-data-service/requirements.txt
            koduck-data-service/pyproject.toml

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run data service tests
        run: |
          set -euo pipefail
          pytest -q tests
