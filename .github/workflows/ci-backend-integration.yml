name: Backend Integration Tests

on:
  schedule:
    # Run nightly at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'koduck-backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'koduck-backend/**'

permissions:
  contents: read

concurrency:
  group: backend-integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-tests:
    name: Integration Tests (Java 23)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: koduck
          POSTGRES_PASSWORD: koduck_test
          POSTGRES_DB: koduck_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      rabbitmq:
        image: rabbitmq:3-alpine
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5672:5672
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: koduck_test
      DB_USERNAME: koduck
      DB_PASSWORD: koduck_test
      CREDENTIAL_ENCRYPTION_KEY: ci-test-credential-encryption-key-32chars
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      RABBITMQ_HOST: localhost
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '23'
          cache: maven

      - name: Run Integration Tests
        run: |
          set -euo pipefail
          mvn -B -f koduck-backend/pom.xml clean test \
            -Dtest=com.koduck.integration.IntegrationSmokeTest

      - name: Upload Integration Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports-${{ github.run_id }}
          path: |
            koduck-backend/target/surefire-reports/
            koduck-backend/target/failsafe-reports/
          retention-days: 7
