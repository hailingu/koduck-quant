apiVersion: v1
kind: ServiceAccount
metadata:
  name: koduck-ai-registry
  namespace: koduck
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: koduck-ai-registry-reader
  namespace: koduck
rules:
  - apiGroups:
      - platform.koduck.io
    resources:
      - capabilityservices
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - services
      - pods
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - discovery.k8s.io
    resources:
      - endpointslices
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: koduck-ai-registry-reader
  namespace: koduck
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: koduck-ai-registry-reader
subjects:
  - kind: ServiceAccount
    name: koduck-ai-registry
    namespace: koduck
