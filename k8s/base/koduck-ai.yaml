apiVersion: apps/v1
kind: Deployment
metadata:
  name: koduck-ai
  namespace: koduck
  labels:
    app: koduck-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: koduck-ai
  template:
    metadata:
      labels:
        app: koduck-ai
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: koduck-ai-registry
      containers:
        - name: koduck-ai
          image: koduck/koduck-ai:latest
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8083
              protocol: TCP
            - name: grpc
              containerPort: 50051
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: KODUCK_AI__SERVER__HTTP_ADDR
              value: "0.0.0.0:8083"
            - name: KODUCK_AI__SERVER__GRPC_ADDR
              value: "0.0.0.0:50051"
            - name: KODUCK_AI__TOOLS__GRPC_TARGET
              value: "localhost:50051"
            - name: KODUCK_AI__LLM__ADAPTER_GRPC_TARGET
              value: "localhost:50051"
            - name: KODUCK_AI__LLM__DEFAULT_PROVIDER
              value: "openai"
            - name: KODUCK_AI__LLM__TIMEOUT_MS
              value: "60000"
            - name: KODUCK_AI__STREAM__MAX_DURATION_MS
              value: "300000"
            - name: KODUCK_AI__REGISTRY__ENABLED
              value: "true"
            - name: KODUCK_AI__REGISTRY__NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: KODUCK_AI__REGISTRY__POLL_INTERVAL_SECS
              value: "30"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: koduck-ai
  namespace: koduck
  labels:
    app: koduck-ai
spec:
  type: ClusterIP
  selector:
    app: koduck-ai
  ports:
    - name: http
      port: 8083
      targetPort: http
      protocol: TCP
    - name: grpc
      port: 50051
      targetPort: grpc
      protocol: TCP
---
# Headless service for gRPC client load balancing
apiVersion: v1
kind: Service
metadata:
  name: koduck-ai-grpc
  namespace: koduck
  labels:
    app: koduck-ai
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: koduck-ai
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
      protocol: TCP
