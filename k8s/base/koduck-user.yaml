apiVersion: apps/v1
kind: Deployment
metadata:
  name: koduck-user
  namespace: koduck
  labels:
    app: koduck-user
spec:
  replicas: 2
  selector:
    matchLabels:
      app: koduck-user
  template:
    metadata:
      labels:
        app: koduck-user
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8082"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: koduck-user
          image: koduck/koduck-user:latest
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8082
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: koduck-user-secrets
                  key: database-url
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: koduck-user-secrets
                  key: db-username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: koduck-user-secrets
                  key: db-password
            - name: STORAGE_PROVIDER
              valueFrom:
                secretKeyRef:
                  name: koduck-user-secrets
                  key: storage-provider
                  optional: true
            - name: S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: koduck-user-secrets
                  key: s3-bucket
                  optional: true
            - name: S3_REGION
              valueFrom:
                secretKeyRef:
                  name: koduck-user-secrets
                  key: s3-region
                  optional: true
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: koduck-user-secrets
                  key: s3-access-key
                  optional: true
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: koduck-user-secrets
                  key: s3-secret-key
                  optional: true
            - name: S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: koduck-user-secrets
                  key: s3-endpoint
                  optional: true
            - name: S3_PATH_STYLE_ACCESS_ENABLED
              valueFrom:
                secretKeyRef:
                  name: koduck-user-secrets
                  key: s3-path-style-access-enabled
                  optional: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: koduck-user
  namespace: koduck
  labels:
    app: koduck-user
spec:
  type: ClusterIP
  selector:
    app: koduck-user
  ports:
    - name: http
      port: 8082
      targetPort: http
      protocol: TCP
---
apiVersion: v1
kind: Secret
metadata:
  name: koduck-user-secrets
  namespace: koduck
type: Opaque
stringData:
  database-url: "jdbc:postgresql://postgres:5432/user_db"
  db-username: "koduck"
  db-password: "koduck_secret"
