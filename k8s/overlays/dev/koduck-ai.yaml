apiVersion: apps/v1
kind: Deployment
metadata:
  name: koduck-ai
  namespace: koduck
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: koduck-ai
          image: koduck-ai:dev
          imagePullPolicy: Never
          envFrom:
            - secretRef:
                name: dev-koduck-ai-llm-secrets
          env:
            - name: RUST_LOG
              value: "info,koduck_ai=info,tower_http=warn"
            - name: KODUCK_AI__TOOLS__ENABLED
              value: "false"
            - name: KODUCK_AI__TOOLS__GRPC_TARGET
              value: "http://dev-apisix-gateway:9080"
            - name: KODUCK_AI__LLM__ADAPTER_GRPC_TARGET
              $patch: delete
            - name: KODUCK_AI__LLM__MODE
              value: "direct"
            - name: KODUCK_AI__LLM__DEFAULT_PROVIDER
              value: "minimax"
            - name: KODUCK_AI__LLM__OPENAI__ENABLED
              value: "false"
            - name: KODUCK_AI__LLM__DEEPSEEK__ENABLED
              value: "true"
            - name: KODUCK_AI__LLM__MINIMAX__ENABLED
              value: "true"
            - name: KODUCK_AI__LLM__KIMI__ENABLED
              value: "true"
            - name: KODUCK_AI__LLM__STUB_ENABLED
              value: "false"
            - name: KODUCK_AI__RELIABILITY__DEGRADE__ENABLED
              value: "true"
            - name: KODUCK_AI__RELIABILITY__DEGRADE__CHAT_ENABLED
              value: "true"
            - name: KODUCK_AI__RELIABILITY__DEGRADE__CHAT_STREAM_ENABLED
              value: "true"
            - name: KODUCK_AI__AUTH__JWKS_URL
              value: "http://dev-koduck-auth:8081/.well-known/jwks.json"
