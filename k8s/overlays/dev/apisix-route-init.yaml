---
# APISIX Route Init Job (dev)
# 注册 JWT consumer + 路由分发：auth 公开、API 需认证、WS 公开、前端公开
# AI 路由使用 openid-connect 插件做 OIDC 校验（bearer_only + JWKS）
# OIDC discovery / introspection 端点透传到 koduck-auth
# 注意：此文件不经过 kustomize，由 deploy.sh 在 APISIX 就绪后单独 apply
apiVersion: batch/v1
kind: Job
metadata:
  name: dev-apisix-route-init
  namespace: koduck-dev
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        environment: dev
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init-route
          image: curlimages/curl:8.7.1
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "32Mi"
              cpu: "50m"
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: jwt-secret
            - name: INTERNAL_API_KEY_USER
              value: "uk_test_key_12345678"
            - name: ADMIN_KEY
              value: "edd1c9f034335f136f87ad84b625c8f1"
            - name: APISIX_GATEWAY
              value: "dev-apisix-gateway"
            - name: BACKEND_SERVICE
              value: "backend:8080"
            - name: AUTH_SERVICE
              value: "dev-koduck-auth:8081"
            - name: FRONTEND_SERVICE
              value: "dev-koduck-frontend:80"
            - name: AI_SERVICE
              value: "dev-koduck-ai:8083"
          command:
            - /bin/sh
            - -ec
            - |
              ADMIN="http://${APISIX_GATEWAY}:9180/apisix/admin"
              KEY="X-API-KEY: ${ADMIN_KEY}"

              echo "Waiting for APISIX Admin API..."
              for i in $(seq 1 60); do
                if curl -fsS -H "$KEY" "${ADMIN}/routes" >/dev/null; then
                  break
                fi
                sleep 2
              done

              echo "Registering JWT consumer: koduck_user"
              curl -fsS -X PUT "${ADMIN}/consumers/koduck_user" \
                -H "$KEY" -H 'Content-Type: application/json' \
                -d "$(printf '{"username":"koduck_user","plugins":{"jwt-auth":{"key":"koduck_user","secret":"%s","algorithm":"HS256"}}}' "$JWT_SECRET")"

              echo "Registering key-auth consumer: koduck_user_consumer"
              curl -fsS -X PUT "${ADMIN}/consumers/koduck_user_consumer" \
                -H "$KEY" -H 'Content-Type: application/json' \
                -d "$(printf '{"username":"koduck_user_consumer","plugins":{"key-auth":{"key":"%s"}}}' "$INTERNAL_API_KEY_USER")"

              # ── OIDC 公开端点（APISIX 透传到 koduck-auth） ──

              echo "Registering JWKS route: /.well-known/jwks.json -> koduck-auth"
              curl -fsS -X PUT "${ADMIN}/routes/jwks" \
                -H "$KEY" -H 'Content-Type: application/json' \
                -d "$(printf '{"uri":"/.well-known/jwks.json","upstream":{"type":"roundrobin","nodes":{"%s":1}}}' "$AUTH_SERVICE")"

              echo "Registering OIDC discovery route: /.well-known/openid-configuration -> koduck-auth"
              curl -fsS -X PUT "${ADMIN}/routes/oidc-discovery" \
                -H "$KEY" -H 'Content-Type: application/json' \
                -d "$(printf '{"uri":"/.well-known/openid-configuration","upstream":{"type":"roundrobin","nodes":{"%s":1}}}' "$AUTH_SERVICE")"

              echo "Registering token introspection route: /oauth/introspect -> koduck-auth"
              curl -fsS -X PUT "${ADMIN}/routes/oauth-introspect" \
                -H "$KEY" -H 'Content-Type: application/json' \
                -d "$(printf '{"uri":"/oauth/introspect","upstream":{"type":"roundrobin","nodes":{"%s":1}}}' "$AUTH_SERVICE")"

              # ── Auth 公开路由 ──

              echo "Registering internal token route: /internal/tokens/* -> koduck-auth (key-auth)"
              curl -fsS -X PUT "${ADMIN}/routes/auth-internal-tokens" \
                -H "$KEY" -H 'Content-Type: application/json' \
                -d "$(printf '{"uri":"/internal/tokens/*","priority":100,"plugins":{"key-auth":{},"proxy-rewrite":{"headers":{"X-Consumer-Username":"$consumer_name","apikey":""}}},"upstream":{"type":"roundrobin","nodes":{"%s":1}}}' "$AUTH_SERVICE")"

              echo "Registering public auth route: /api/v1/auth/* -> koduck-auth"
              curl -fsS -X PUT "${ADMIN}/routes/api-auth-public" \
                -H "$KEY" -H 'Content-Type: application/json' \
                -d "$(printf '{"uri":"/api/v1/auth/*","upstream":{"type":"roundrobin","nodes":{"%s":1}}}' "$AUTH_SERVICE")"

              # ── 受保护 API 路由（jwt-auth） ──

              echo "Registering protected API route: /api/* -> backend (jwt-auth)"
              curl -fsS -X PUT "${ADMIN}/routes/api-protected" \
                -H "$KEY" -H 'Content-Type: application/json' \
                -d "$(printf '{"uri":"/api/*","plugins":{"jwt-auth":{}},"upstream":{"type":"roundrobin","nodes":{"%s":1}}}' "$BACKEND_SERVICE")"

              # ── AI 路由（openid-connect 插件做 OIDC 校验） ──
              # APISIX 通过 JWKS 本地验签 Bearer token，校验通过后
              # 通过 proxy-rewrite 注入 X-Auth-Provider 标记，
              # koduck-ai 据此跳过 JWKS 重验，直接解码 payload 提取用户身份。
              # priority=10 高于通配 /api/* 的 priority=0。

              for AI_ROUTE in api-ai-chat api-ai-stream api-ai-chat-stream; do
                case "$AI_ROUTE" in
                  api-ai-chat)        URI="/api/v1/ai/chat" ;;
                  api-ai-stream)      URI="/api/v1/ai/stream" ;;
                  api-ai-chat-stream) URI="/api/v1/ai/chat/stream" ;;
                esac

                echo "Registering AI route: ${URI} -> koduck-ai (openid-connect)"
                curl -fsS -X PUT "${ADMIN}/routes/${AI_ROUTE}" \
                  -H "$KEY" -H 'Content-Type: application/json' \
                  -d "$(printf '{"uri":"%s","priority":10,"plugins":{"openid-connect":{"client_id":"koduck-ai","client_secret":"%s","discovery":"http://%s/.well-known/openid-configuration","scope":"openid","ssl_verify":false,"timeout":10,"bearer_only":true,"use_jwks":true,"token_signing_alg_values_expected":"RS256","set_access_token_header":true,"access_token_in_authorization_header":true,"set_id_token_header":false,"set_userinfo_header":false,"jwk_expires_in":3600},"proxy-rewrite":{"headers":{"set":{"X-Auth-Provider":"apisix-oidc"}}}},"upstream":{"type":"roundrobin","nodes":{"%s":1}}}' "$URI" "$JWT_SECRET" "$AUTH_SERVICE" "$AI_SERVICE")"
              done

              # ── WebSocket / Frontend 路由 ──

              echo "Registering WebSocket route: /ws/* -> backend"
              curl -fsS -X PUT "${ADMIN}/routes/ws" \
                -H "$KEY" -H 'Content-Type: application/json' \
                -d "$(printf '{"uri":"/ws/*","upstream":{"type":"roundrobin","nodes":{"%s":1}}}' "$BACKEND_SERVICE")"

              echo "Registering frontend catch-all route: /* -> frontend"
              curl -fsS -X PUT "${ADMIN}/routes/frontend-root" \
                -H "$KEY" -H 'Content-Type: application/json' \
                -d "$(printf '{"uri":"/*","upstream":{"type":"roundrobin","nodes":{"%s":1}}}' "$FRONTEND_SERVICE")"

              echo "All registrations done."
