---
# APISIX Route Init Job (dev)
# 注册 JWT consumer + 路由分发：auth 公开、API 需认证、WS 公开、前端公开
# AI 路由使用 openid-connect 插件做 OIDC 校验（bearer_only + JWKS）
# OIDC discovery / introspection 端点透传到 koduck-auth
# 注意：此文件不经过 kustomize，由 deploy.sh 在 APISIX 就绪后单独 apply
apiVersion: batch/v1
kind: Job
metadata:
  name: dev-apisix-route-init
  namespace: koduck-dev
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        environment: dev
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init-route
          image: curlimages/curl:8.7.1
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "32Mi"
              cpu: "50m"
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: jwt-secret
            - name: INTERNAL_API_KEY_USER
              value: "uk_test_key_12345678"
            - name: ADMIN_KEY
              value: "edd1c9f034335f136f87ad84b625c8f1"
            - name: APISIX_GATEWAY
              value: "dev-apisix-gateway"
            - name: BACKEND_SERVICE
              value: "backend:8080"
            - name: AUTH_SERVICE
              value: "dev-koduck-auth:8081"
            - name: FRONTEND_SERVICE
              value: "dev-koduck-frontend:80"
            - name: AI_SERVICE
              value: "dev-koduck-ai:8083"
            - name: MEMORY_GRPC_SERVICE
              value: "dev-memory-service:50051"
            - name: TOOL_GRPC_SERVICE
              value: "dev-tool-service:50051"
            - name: APISIX_SERVICE_NAME
              value: "koduck-apisix-dev"
            - name: ENABLE_AI_GRPC_TRANSCODE
              value: "false"
          command:
            - /bin/sh
            - -ec
            - |
              set -eu

              ADMIN="http://${APISIX_GATEWAY}:9180/apisix/admin"
              KEY="X-API-KEY: ${ADMIN_KEY}"
              CREATED_RESOURCES_FILE="$(mktemp)"
              UPDATED_RESOURCES_FILE="$(mktemp)"
              ENABLE_ROLLBACK=1

              cleanup_temp_files() {
                rm -f "$CREATED_RESOURCES_FILE" "$UPDATED_RESOURCES_FILE"
              }

              resource_url() {
                printf '%s/%s/%s' "$ADMIN" "$1" "$2"
              }

              record_created_resource() {
                printf '%s|%s\n' "$1" "$2" >>"$CREATED_RESOURCES_FILE"
              }

              record_updated_resource() {
                printf '%s|%s|%s\n' "$1" "$2" "$3" >>"$UPDATED_RESOURCES_FILE"
              }

              delete_resource() {
                kind="$1"
                resource_id="$2"
                curl -fsS -X DELETE "$(resource_url "$kind" "$resource_id")" -H "$KEY" >/dev/null
              }

              restore_resource() {
                kind="$1"
                resource_id="$2"
                backup_file="$3"
                payload="$(tr -d '\n' <"$backup_file" | sed 's/^.*"value"://; s/,"key":.*$//')"
                if [ -z "$payload" ]; then
                  echo "Failed to extract backup payload for ${kind}/${resource_id}" >&2
                  return 1
                fi
                curl -fsS -X PUT "$(resource_url "$kind" "$resource_id")" \
                  -H "$KEY" \
                  -H 'Content-Type: application/json' \
                  -d "$payload" >/dev/null
              }

              rollback_grpc_resources() {
                if [ "$ENABLE_ROLLBACK" -ne 1 ]; then
                  cleanup_temp_files
                  return 0
                fi

                echo "Rolling back gRPC upstream/route changes..."

                if [ -f "$CREATED_RESOURCES_FILE" ]; then
                  if grep -q '^routes|' "$CREATED_RESOURCES_FILE"; then
                    grep '^routes|' "$CREATED_RESOURCES_FILE" | while IFS='|' read -r kind resource_id; do
                      [ -n "$kind" ] || continue
                      delete_resource "$kind" "$resource_id" || true
                    done
                  fi
                  if grep -q '^upstreams|' "$CREATED_RESOURCES_FILE"; then
                    grep '^upstreams|' "$CREATED_RESOURCES_FILE" | while IFS='|' read -r kind resource_id; do
                      [ -n "$kind" ] || continue
                      delete_resource "$kind" "$resource_id" || true
                    done
                  fi
                fi

                if [ -f "$UPDATED_RESOURCES_FILE" ]; then
                  if grep -q '^routes|' "$UPDATED_RESOURCES_FILE"; then
                    grep '^routes|' "$UPDATED_RESOURCES_FILE" | while IFS='|' read -r kind resource_id backup_file; do
                      [ -n "$kind" ] || continue
                      restore_resource "$kind" "$resource_id" "$backup_file" || true
                      rm -f "$backup_file"
                    done
                  fi
                  if grep -q '^upstreams|' "$UPDATED_RESOURCES_FILE"; then
                    grep '^upstreams|' "$UPDATED_RESOURCES_FILE" | while IFS='|' read -r kind resource_id backup_file; do
                      [ -n "$kind" ] || continue
                      restore_resource "$kind" "$resource_id" "$backup_file" || true
                      rm -f "$backup_file"
                    done
                  fi
                fi

                cleanup_temp_files
              }

              trap 'rollback_grpc_resources' EXIT HUP INT TERM

              upsert_resource() {
                kind="$1"
                resource_id="$2"
                payload="$3"
                backup_file="$(mktemp)"
                http_code="$(curl -sS -o "$backup_file" -w '%{http_code}' -H "$KEY" "$(resource_url "$kind" "$resource_id")")"

                case "$http_code" in
                  200)
                    record_updated_resource "$kind" "$resource_id" "$backup_file"
                    ;;
                  404)
                    rm -f "$backup_file"
                    record_created_resource "$kind" "$resource_id"
                    ;;
                  *)
                    echo "Unexpected HTTP ${http_code} while reading ${kind}/${resource_id}" >&2
                    rm -f "$backup_file"
                    exit 1
                    ;;
                esac

                curl -fsS -X PUT "$(resource_url "$kind" "$resource_id")" \
                  -H "$KEY" \
                  -H 'Content-Type: application/json' \
                  -d "$payload" >/dev/null
              }

              echo "Waiting for APISIX Admin API..."
              for i in $(seq 1 60); do
                if curl -fsS -H "$KEY" "${ADMIN}/routes" >/dev/null; then
                  break
                fi
                sleep 2
              done

              echo "Registering opentelemetry plugin metadata"
              upsert_resource "plugin_metadata" "opentelemetry" "$(printf '{"trace_id_source":"random","set_ngx_var":true,"resource":{"service.name":"%s"},"additional_attributes":["route_id","service_id","upstream_addr","status"],"additional_header_prefix_attributes":["x-request-id","x-session-id","x-user-id"]}' "$APISIX_SERVICE_NAME")"

              echo "Registering JWT consumer: koduck_user"
              curl -fsS -X PUT "${ADMIN}/consumers/koduck_user" \
                -H "$KEY" -H 'Content-Type: application/json' \
                -d "$(printf '{"username":"koduck_user","plugins":{"jwt-auth":{"key":"koduck_user","secret":"%s","algorithm":"HS256"}}}' "$JWT_SECRET")"

              echo "Registering key-auth consumer: koduck_user_consumer"
              curl -fsS -X PUT "${ADMIN}/consumers/koduck_user_consumer" \
                -H "$KEY" -H 'Content-Type: application/json' \
                -d "$(printf '{"username":"koduck_user_consumer","plugins":{"key-auth":{"key":"%s"}}}' "$INTERNAL_API_KEY_USER")"

              # ── OIDC 公开端点（APISIX 透传到 koduck-auth） ──

              echo "Registering JWKS route: /.well-known/jwks.json -> koduck-auth"
              curl -fsS -X PUT "${ADMIN}/routes/jwks" \
                -H "$KEY" -H 'Content-Type: application/json' \
                -d "$(printf '{"uri":"/.well-known/jwks.json","upstream":{"type":"roundrobin","nodes":{"%s":1}}}' "$AUTH_SERVICE")"

              echo "Registering OIDC discovery route: /.well-known/openid-configuration -> koduck-auth"
              curl -fsS -X PUT "${ADMIN}/routes/oidc-discovery" \
                -H "$KEY" -H 'Content-Type: application/json' \
                -d "$(printf '{"uri":"/.well-known/openid-configuration","upstream":{"type":"roundrobin","nodes":{"%s":1}}}' "$AUTH_SERVICE")"

              echo "Registering token introspection route: /oauth/introspect -> koduck-auth"
              curl -fsS -X PUT "${ADMIN}/routes/oauth-introspect" \
                -H "$KEY" -H 'Content-Type: application/json' \
                -d "$(printf '{"uri":"/oauth/introspect","upstream":{"type":"roundrobin","nodes":{"%s":1}}}' "$AUTH_SERVICE")"

              # ── Auth 公开路由 ──

              echo "Registering internal token route: /internal/tokens/* -> koduck-auth (key-auth)"
              curl -fsS -X PUT "${ADMIN}/routes/auth-internal-tokens" \
                -H "$KEY" -H 'Content-Type: application/json' \
                -d "$(printf '{"uri":"/internal/tokens/*","priority":100,"plugins":{"key-auth":{},"proxy-rewrite":{"headers":{"X-Consumer-Username":"$consumer_name","apikey":""}}},"upstream":{"type":"roundrobin","nodes":{"%s":1}}}' "$AUTH_SERVICE")"

              echo "Registering public auth route: /api/v1/auth/* -> koduck-auth"
              curl -fsS -X PUT "${ADMIN}/routes/api-auth-public" \
                -H "$KEY" -H 'Content-Type: application/json' \
                -d "$(printf '{"uri":"/api/v1/auth/*","upstream":{"type":"roundrobin","nodes":{"%s":1}}}' "$AUTH_SERVICE")"

              # ── 受保护 API 路由（jwt-auth） ──

              echo "Registering protected API route: /api/* -> backend (jwt-auth)"
              curl -fsS -X PUT "${ADMIN}/routes/api-protected" \
                -H "$KEY" -H 'Content-Type: application/json' \
                -d "$(printf '{"uri":"/api/*","plugins":{"jwt-auth":{},"proxy-rewrite":{"headers":{"X-User-Id":"$jwt_claim_user_id","X-Username":"$jwt_claim_username","X-Roles":"$jwt_claim_roles","X-Tenant-Id":"$jwt_claim_tenant_id"}}},"upstream":{"type":"roundrobin","nodes":{"%s":1}}}' "$BACKEND_SERVICE")"

              # ── AI 路由（openid-connect 插件做 OIDC 校验） ──
              # APISIX 通过 JWKS 本地验签 Bearer token，校验通过后
              # 通过 proxy-rewrite 注入 X-Auth-Provider 标记，
              # koduck-ai 据此跳过 JWKS 重验，直接解码 payload 提取用户身份。
              # priority=10 高于通配 /api/* 的 priority=0。

              for AI_ROUTE in api-ai-chat api-ai-stream api-ai-chat-stream; do
                case "$AI_ROUTE" in
                  api-ai-chat)        URI="/api/v1/ai/chat" ;;
                  api-ai-stream)      URI="/api/v1/ai/stream" ;;
                  api-ai-chat-stream) URI="/api/v1/ai/chat/stream" ;;
                esac

                echo "Registering AI route: ${URI} -> koduck-ai (openid-connect)"
                curl -fsS -X PUT "${ADMIN}/routes/${AI_ROUTE}" \
                  -H "$KEY" -H 'Content-Type: application/json' \
                  -d "$(printf '{"uri":"%s","priority":10,"plugins":{"openid-connect":{"client_id":"koduck-ai","client_secret":"%s","discovery":"http://%s/.well-known/openid-configuration","scope":"openid","ssl_verify":false,"timeout":10,"bearer_only":true,"use_jwks":true,"token_signing_alg_values_expected":"RS256","set_access_token_header":true,"access_token_in_authorization_header":true,"set_id_token_header":false,"set_userinfo_header":false,"jwk_expires_in":3600},"limit-count":{"count":120,"time_window":60,"key":"$consumer_name $uri","key_type":"var_combination","rejected_code":429,"rejected_msg":"ai gateway quota exceeded"},"limit-req":{"rate":20,"burst":10,"key":"$consumer_name $uri","key_type":"var_combination","rejected_code":429,"rejected_msg":"ai gateway burst limited","nodelay":true},"opentelemetry":{"sampler":{"name":"always_on"}},"proxy-rewrite":{"headers":{"set":{"X-Auth-Provider":"apisix-oidc","X-Request-Id":"$request_id","X-Trace-Id":"$opentelemetry_trace_id","traceparent":"$opentelemetry_context_traceparent","X-User-Id":"$consumer_name","X-Session-Id":"$http_x_session_id"}}}},"upstream":{"type":"roundrobin","nodes":{"%s":1}}}' "$URI" "$JWT_SECRET" "$AUTH_SERVICE" "$AI_SERVICE")"
              done

              # ── Southbound gRPC 治理路由（供 koduck-ai 访问 memory/tool） ──

              echo "Registering gRPC upstreams for memory/tool"
              upsert_resource "upstreams" "ai-memory-grpc" "$(printf '{"name":"ai-memory-grpc","type":"roundrobin","scheme":"grpc","retries":1,"timeout":{"connect":1,"send":5,"read":65},"nodes":{"%s":1}}' "$MEMORY_GRPC_SERVICE")"
              upsert_resource "upstreams" "ai-tool-grpc" "$(printf '{"name":"ai-tool-grpc","type":"roundrobin","scheme":"grpc","retries":1,"timeout":{"connect":1,"send":5,"read":65},"nodes":{"%s":1}}' "$TOOL_GRPC_SERVICE")"

              echo "Registering gRPC routes for memory/tool"
              upsert_resource "routes" "ai-memory-grpc-route" '{"uri":"/koduck.memory.v1.MemoryService/*","priority":200,"plugins":{"limit-count":{"count":600,"time_window":60,"key":"$uri","key_type":"var","rejected_code":429,"rejected_msg":"ai memory grpc quota exceeded"},"limit-req":{"rate":120,"burst":60,"key":"$uri","key_type":"var","rejected_code":429,"rejected_msg":"ai memory grpc burst limited","nodelay":true},"opentelemetry":{"sampler":{"name":"always_on"}},"proxy-rewrite":{"headers":{"set":{"X-Request-Id":"$http_x_request_id","X-Trace-Id":"$opentelemetry_trace_id","traceparent":"$opentelemetry_context_traceparent","X-Session-Id":"$http_x_session_id","X-User-Id":"$http_x_user_id"}}}},"upstream_id":"ai-memory-grpc"}'
              upsert_resource "routes" "ai-tool-grpc-route" '{"uri":"/koduck.tool.v1.ToolService/*","priority":200,"plugins":{"limit-count":{"count":600,"time_window":60,"key":"$uri","key_type":"var","rejected_code":429,"rejected_msg":"ai tool grpc quota exceeded"},"limit-req":{"rate":120,"burst":60,"key":"$uri","key_type":"var","rejected_code":429,"rejected_msg":"ai tool grpc burst limited","nodelay":true},"opentelemetry":{"sampler":{"name":"always_on"}},"proxy-rewrite":{"headers":{"set":{"X-Request-Id":"$http_x_request_id","X-Trace-Id":"$opentelemetry_trace_id","traceparent":"$opentelemetry_context_traceparent","X-Session-Id":"$http_x_session_id","X-User-Id":"$http_x_user_id"}}}},"upstream_id":"ai-tool-grpc"}'

              echo "Removing deprecated llm adapter gRPC routes and upstreams"
              delete_resource "routes" "ai-llm-stream-grpc-route" || true
              delete_resource "routes" "ai-llm-grpc-route" || true
              delete_resource "upstreams" "ai-llm-stream-grpc" || true
              delete_resource "upstreams" "ai-llm-grpc" || true

              if [ "${ENABLE_AI_GRPC_TRANSCODE}" = "true" ]; then
                echo "grpc-transcode migration window enabled; route definitions should be added with explicit proto assets."
              else
                echo "grpc-transcode migration window disabled; no transcode routes registered."
              fi

              # ── WebSocket / Frontend 路由 ──

              echo "Registering WebSocket route: /ws/* -> backend"
              curl -fsS -X PUT "${ADMIN}/routes/ws" \
                -H "$KEY" -H 'Content-Type: application/json' \
                -d "$(printf '{"uri":"/ws/*","upstream":{"type":"roundrobin","nodes":{"%s":1}}}' "$BACKEND_SERVICE")"

              echo "Registering frontend catch-all route: /* -> frontend"
              curl -fsS -X PUT "${ADMIN}/routes/frontend-root" \
                -H "$KEY" -H 'Content-Type: application/json' \
                -d "$(printf '{"uri":"/*","upstream":{"type":"roundrobin","nodes":{"%s":1}}}' "$FRONTEND_SERVICE")"

              ENABLE_ROLLBACK=0
              cleanup_temp_files
              echo "All registrations done."
