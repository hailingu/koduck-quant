---
# Koduck Frontend - Dev 环境覆盖
# 开发环境使用较低资源限制

apiVersion: apps/v1
kind: Deployment
metadata:
  name: koduck-frontend
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: frontend
          image: koduck-frontend:dev
          imagePullPolicy: Never
          env:
            - name: KODUCK_FRONTEND_RUNTIME_CONFIG_JSON
              value: >-
                {"llm":{"defaultProvider":"minimax","providers":[{"value":"minimax","label":"MiniMax","defaultModel":"MiniMax-M2.7","models":["MiniMax-M2.7","MiniMax-M2.5"]},{"value":"deepseek","label":"DeepSeek","defaultModel":"deepseek-v4-flash","models":["deepseek-v4-flash","deepseek-v4-pro"]},{"value":"kimi","label":"Kimi","defaultModel":"kimi-for-coding","models":["kimi-for-coding"]}]}}
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
              ephemeral-storage: "50Mi"
            limits:
              memory: "64Mi"
              cpu: "50m"
              ephemeral-storage: "100Mi"
