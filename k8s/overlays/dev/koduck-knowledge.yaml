apiVersion: apps/v1
kind: Deployment
metadata:
  name: koduck-knowledge
  namespace: koduck
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: koduck-knowledge
          image: koduck-knowledge:dev
          imagePullPolicy: Never
---
apiVersion: v1
kind: Secret
metadata:
  name: koduck-knowledge-secrets
  namespace: koduck
stringData:
  database-url: "jdbc:postgresql://dev-postgres:5432/koduck_knowledge"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: koduck-knowledge
  namespace: koduck
spec:
  minReplicas: 1
  maxReplicas: 2
