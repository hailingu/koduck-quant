apiVersion: apps/v1
kind: Deployment
metadata:
  name: koduck-auth
  namespace: koduck
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: koduck-auth
          image: koduck-auth:dev
          imagePullPolicy: Never
          env:
            - name: RUST_LOG
              value: "info,koduck_auth=info,tower_http=warn"
            - name: KODUCK_AUTH__CLIENT__USER_SERVICE_URL
              value: "http://dev-koduck-user:8082"
      volumes:
        - name: jwt-keys
          secret:
            secretName: dev-koduck-auth-jwt-keys
            items:
              - key: private.pem
                path: private.pem
              - key: public.pem
                path: public.pem
---
apiVersion: v1
kind: Secret
metadata:
  name: koduck-auth-jwt-keys
  namespace: koduck
$patch: delete
