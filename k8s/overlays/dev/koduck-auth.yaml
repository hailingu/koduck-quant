apiVersion: apps/v1
kind: Deployment
metadata:
  name: koduck-auth
  namespace: koduck
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: koduck-auth
          imagePullPolicy: Never
          env:
            - name: RUST_LOG
              value: "debug"
---
apiVersion: v1
kind: Secret
metadata:
  name: koduck-auth-jwt-keys
  namespace: koduck
type: Opaque
data:
  # Dev keys - replace with real keys in production
  # Generated: openssl genrsa -out private.pem 2048
  #           openssl rsa -in private.pem -pubout -out public.pem
  private.pem: ""
  public.pem: ""
