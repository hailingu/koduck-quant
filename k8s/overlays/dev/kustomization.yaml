apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: koduck-dev

resources:
  - ./namespace.yaml
  - ../../base/frontend.yaml
  - ../../base/koduck-auth.yaml
  - ./apisix.yaml

patchesStrategicMerge:
  - ./frontend.yaml
  - ./koduck-auth.yaml

namePrefix: dev-

labels:
  - pairs:
      environment: dev
    includeSelectors: true
