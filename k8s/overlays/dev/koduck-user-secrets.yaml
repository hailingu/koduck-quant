apiVersion: v1
kind: Secret
metadata:
  name: koduck-user-secrets
  namespace: koduck
type: Opaque
stringData:
  database-url: "jdbc:postgresql://dev-postgres:5432/user_db"
  db-username: "koduck"
  db-password: "koduck_secret"
  storage-provider: "s3"
  s3-bucket: "koduck-avatar-dev"
  s3-region: "us-east-1"
  s3-access-key: "minioadmin"
  s3-secret-key: "minioadmin"
  s3-endpoint: "http://dev-minio:9000"
  s3-path-style-access-enabled: "true"
