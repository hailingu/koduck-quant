---
# 开发环境：降低资源限制
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apisix-gateway
spec:
  template:
    spec:
      containers:
        - name: apisix
          resources:
            requests:
              memory: "64Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "100m"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: apisix-etcd
spec:
  template:
    spec:
      containers:
        - name: etcd
          resources:
            requests:
              memory: "64Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "100m"
---
# 开发环境：减小 PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: apisix-etcd-data
spec:
  resources:
    requests:
      storage: 1Gi
