---
# APISIX 开发环境配置
# 使用 quay.io/coreos/etcd:v3.5.15

# PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: apisix-etcd-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: hostpath
---
# etcd Service
apiVersion: v1
kind: Service
metadata:
  name: apisix-etcd
  labels:
    app: apisix-etcd
spec:
  type: ClusterIP
  ports:
    - port: 2379
      targetPort: 2379
      name: client
    - port: 2380
      targetPort: 2380
      name: peer
  selector:
    app: apisix-etcd
---
# etcd StatefulSet (coreos/etcd 版本)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: apisix-etcd
  labels:
    app: apisix-etcd
spec:
  serviceName: apisix-etcd
  replicas: 1
  selector:
    matchLabels:
      app: apisix-etcd
  template:
    metadata:
      labels:
        app: apisix-etcd
    spec:
      containers:
        - name: etcd
          image: quay.io/coreos/etcd:v3.5.15
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 2379
              name: client
            - containerPort: 2380
              name: peer
          command:
            - /usr/local/bin/etcd
          args:
            - --name=etcd-0
            - --data-dir=/etcd-data
            - --listen-client-urls=http://0.0.0.0:2379
            - --advertise-client-urls=http://dev-apisix-etcd:2379
            - --listen-peer-urls=http://0.0.0.0:2380
            - --initial-advertise-peer-urls=http://dev-apisix-etcd:2380
            - --initial-cluster=etcd-0=http://dev-apisix-etcd:2380
            - --initial-cluster-token=etcd-cluster
            - --initial-cluster-state=new
          resources:
            requests:
              memory: "64Mi"
              cpu: "25m"
              ephemeral-storage: "50Mi"
            limits:
              memory: "128Mi"
              cpu: "100m"
              ephemeral-storage: "500Mi"
          volumeMounts:
            - name: data
              mountPath: /etcd-data
          livenessProbe:
            exec:
              command:
                - /usr/local/bin/etcdctl
                - --endpoints=http://localhost:2379
                - endpoint
                - health
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: dev-apisix-etcd-data
---
# APISIX Gateway Service
apiVersion: v1
kind: Service
metadata:
  name: apisix-gateway
  labels:
    app: apisix-gateway
spec:
  type: NodePort
  ports:
    - port: 9080
      targetPort: 9080
      nodePort: 30080
      name: http
    - port: 9180
      targetPort: 9180
      nodePort: 30180
      name: admin
    - port: 9091
      targetPort: 9091
      name: metrics
  selector:
    app: apisix-gateway
---
# APISIX Gateway Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apisix-gateway
  labels:
    app: apisix-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apisix-gateway
  template:
    metadata:
      labels:
        app: apisix-gateway
    spec:
      containers:
        - name: apisix
          image: apache/apisix:3.9.0-debian
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9080
              name: http
            - containerPort: 9180
              name: admin
            - containerPort: 9091
              name: metrics
          env:
            - name: APISIX_STAND_ALONE
              value: "false"
            - name: ETCD_HOST
              value: "http://dev-apisix-etcd:2379"
          resources:
            requests:
              memory: "256Mi"
              cpu: "25m"
              ephemeral-storage: "50Mi"
            limits:
              memory: "512Mi"
              cpu: "100m"
              ephemeral-storage: "200Mi"
          volumeMounts:
            - name: config
              mountPath: /usr/local/apisix/conf/config.yaml
              subPath: config.yaml
          livenessProbe:
            tcpSocket:
              port: 9080
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 6
          readinessProbe:
            tcpSocket:
              port: 9080
            initialDelaySeconds: 5
            periodSeconds: 3
          startupProbe:
            tcpSocket:
              port: 9080
            # 给 APISIX 足够时间等待 etcd 与自身初始化完成，避免冷启动抖动触发重启
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
      volumes:
        - name: config
          configMap:
            name: apisix-config
---
# APISIX ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: apisix-config
data:
  config.yaml: |
    apisix:
      node_listen: 9080
      enable_ipv6: false
    deployment:
      role: traditional
      role_traditional:
        config_provider: etcd
      admin:
        allow_admin:
          - 127.0.0.1/32
          - 10.0.0.0/8
        admin_key:
          - name: "admin"
            key: "edd1c9f034335f136f87ad84b625c8f1"
            role: admin
      etcd:
        host:
          - "http://dev-apisix-etcd:2379"
        prefix: "/apisix"
        timeout: 30
    plugins:
      - cors
      - jwt-auth
      - limit-count
      - limit-req
      - prometheus
      - proxy-rewrite
