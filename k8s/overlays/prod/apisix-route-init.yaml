---
# APISIX Route Init Job (prod)
# 注册 JWT consumer + 路由分发：auth 公开、显式受保护 API、前端公开
# 注意：此文件不经过 kustomize，由 deploy.sh 在 APISIX 就绪后单独 apply
apiVersion: batch/v1
kind: Job
metadata:
  name: prod-apisix-route-init
  namespace: koduck-prod
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        environment: prod
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init-route
          image: curlimages/curl:8.7.1
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "32Mi"
              cpu: "50m"
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: jwt-secret
            - name: ADMIN_KEY
              value: "edd1c9f034335f136f87ad84b625c8f1"
            - name: APISIX_GATEWAY
              value: "prod-apisix-gateway"
            - name: AUTH_SERVICE
              value: "prod-koduck-auth:8081"
            - name: USER_SERVICE
              value: "prod-koduck-user:8082"
            - name: FRONTEND_SERVICE
              value: "prod-koduck-frontend:80"
            - name: KNOWLEDGE_SERVICE
              value: "prod-koduck-knowledge:8084"
            - name: AI_SERVICE
              value: "prod-koduck-ai:8083"
            - name: MEMORY_GRPC_SERVICE
              value: "prod-koduck-memory-grpc:50051"
            - name: TOOL_GRPC_SERVICE
              value: "prod-tool-service:50051"
            - name: TOOL_GRPC_ENABLED
              value: "false"
            - name: APISIX_SERVICE_NAME
              value: "koduck-apisix-prod"
            - name: ENABLE_AI_GRPC_TRANSCODE
              value: "false"
          command:
            - /bin/sh
            - -ec
            - |
              set -eu

              ADMIN="http://${APISIX_GATEWAY}:9180/apisix/admin"
              KEY="X-API-KEY: ${ADMIN_KEY}"
              CREATED_RESOURCES_FILE="$(mktemp)"
              UPDATED_RESOURCES_FILE="$(mktemp)"
              ENABLE_ROLLBACK=1

              cleanup_temp_files() {
                rm -f "$CREATED_RESOURCES_FILE" "$UPDATED_RESOURCES_FILE"
              }

              resource_url() {
                printf '%s/%s/%s' "$ADMIN" "$1" "$2"
              }

              record_created_resource() {
                printf '%s|%s\n' "$1" "$2" >>"$CREATED_RESOURCES_FILE"
              }

              record_updated_resource() {
                printf '%s|%s|%s\n' "$1" "$2" "$3" >>"$UPDATED_RESOURCES_FILE"
              }

              delete_resource() {
                kind="$1"
                resource_id="$2"
                curl -fsS -X DELETE "$(resource_url "$kind" "$resource_id")" -H "$KEY" >/dev/null
              }

              restore_resource() {
                kind="$1"
                resource_id="$2"
                backup_file="$3"
                payload="$(tr -d '\n' <"$backup_file" | sed 's/^.*"value"://; s/,"key":.*$//')"
                if [ -z "$payload" ]; then
                  echo "Failed to extract backup payload for ${kind}/${resource_id}" >&2
                  return 1
                fi
                curl -fsS -X PUT "$(resource_url "$kind" "$resource_id")" \
                  -H "$KEY" \
                  -H 'Content-Type: application/json' \
                  -d "$payload" >/dev/null
              }

              rollback_grpc_resources() {
                if [ "$ENABLE_ROLLBACK" -ne 1 ]; then
                  cleanup_temp_files
                  return 0
                fi

                echo "Rolling back gRPC upstream/route changes..."

                if [ -f "$CREATED_RESOURCES_FILE" ]; then
                  if grep -q '^routes|' "$CREATED_RESOURCES_FILE"; then
                    grep '^routes|' "$CREATED_RESOURCES_FILE" | while IFS='|' read -r kind resource_id; do
                      [ -n "$kind" ] || continue
                      delete_resource "$kind" "$resource_id" || true
                    done
                  fi
                  if grep -q '^upstreams|' "$CREATED_RESOURCES_FILE"; then
                    grep '^upstreams|' "$CREATED_RESOURCES_FILE" | while IFS='|' read -r kind resource_id; do
                      [ -n "$kind" ] || continue
                      delete_resource "$kind" "$resource_id" || true
                    done
                  fi
                fi

                if [ -f "$UPDATED_RESOURCES_FILE" ]; then
                  if grep -q '^routes|' "$UPDATED_RESOURCES_FILE"; then
                    grep '^routes|' "$UPDATED_RESOURCES_FILE" | while IFS='|' read -r kind resource_id backup_file; do
                      [ -n "$kind" ] || continue
                      restore_resource "$kind" "$resource_id" "$backup_file" || true
                      rm -f "$backup_file"
                    done
                  fi
                  if grep -q '^upstreams|' "$UPDATED_RESOURCES_FILE"; then
                    grep '^upstreams|' "$UPDATED_RESOURCES_FILE" | while IFS='|' read -r kind resource_id backup_file; do
                      [ -n "$kind" ] || continue
                      restore_resource "$kind" "$resource_id" "$backup_file" || true
                      rm -f "$backup_file"
                    done
                  fi
                fi

                cleanup_temp_files
              }

              trap 'rollback_grpc_resources' EXIT HUP INT TERM

              upsert_resource() {
                kind="$1"
                resource_id="$2"
                payload="$3"
                backup_file="$(mktemp)"
                http_code="$(curl -sS -o "$backup_file" -w '%{http_code}' -H "$KEY" "$(resource_url "$kind" "$resource_id")")"

                case "$http_code" in
                  200)
                    record_updated_resource "$kind" "$resource_id" "$backup_file"
                    ;;
                  404)
                    rm -f "$backup_file"
                    record_created_resource "$kind" "$resource_id"
                    ;;
                  *)
                    echo "Unexpected HTTP ${http_code} while reading ${kind}/${resource_id}" >&2
                    rm -f "$backup_file"
                    exit 1
                    ;;
                esac

                curl -fsS -X PUT "$(resource_url "$kind" "$resource_id")" \
                  -H "$KEY" \
                  -H 'Content-Type: application/json' \
                  -d "$payload" >/dev/null
              }

              echo "Waiting for APISIX Admin API..."
              for i in $(seq 1 60); do
                if curl -fsS -H "$KEY" "${ADMIN}/routes" >/dev/null; then
                  break
                fi
                sleep 2
              done

              echo "Registering opentelemetry plugin metadata"
              upsert_resource "plugin_metadata" "opentelemetry" "$(printf '{"trace_id_source":"random","set_ngx_var":true,"resource":{"service.name":"%s"},"additional_attributes":["route_id","service_id","upstream_addr","status"],"additional_header_prefix_attributes":["x-request-id","x-session-id","x-user-id","x-tenant-id"]}' "$APISIX_SERVICE_NAME")"

              echo "Registering JWT consumer: koduck_user"
              curl -fsS -X PUT "${ADMIN}/consumers/koduck_user" \
                -H "$KEY" -H 'Content-Type: application/json' \
                -d "$(printf '{"username":"koduck_user","plugins":{"jwt-auth":{"key":"koduck_user","secret":"%s","algorithm":"HS256"}}}' "$JWT_SECRET")"

              echo "Registering public auth route: /api/v1/auth/* -> koduck-auth"
              curl -fsS -X PUT "${ADMIN}/routes/api-auth-public" \
                -H "$KEY" -H 'Content-Type: application/json' \
                -d "$(printf '{"uri":"/api/v1/auth/*","upstream":{"type":"roundrobin","nodes":{"%s":1}}}' "$AUTH_SERVICE")"

              echo "Registering koduck-user route: /api/v1/users/* -> koduck-user (jwt-auth)"
              curl -fsS -X PUT "${ADMIN}/routes/user-service" \
                -H "$KEY" -H 'Content-Type: application/json' \
                -d "$(printf '{"uri":"/api/v1/users/*","priority":90,"plugins":{"jwt-auth":{},"proxy-rewrite":{"headers":{"set":{"X-User-Id":"$jwt_claim_sub","X-Username":"$jwt_claim_username","X-Roles":"$jwt_claim_roles","X-Tenant-Id":"$jwt_claim_tenant_id"}}}},"upstream":{"type":"roundrobin","nodes":{"%s":1}}}' "$USER_SERVICE")"

              echo "Registering koduck-knowledge route: /api/v1/entities/* -> koduck-knowledge (jwt-auth)"
              curl -fsS -X PUT "${ADMIN}/routes/knowledge-service" \
                -H "$KEY" -H 'Content-Type: application/json' \
                -d "$(printf '{"uri":"/api/v1/entities/*","priority":95,"plugins":{"jwt-auth":{},"proxy-rewrite":{"headers":{"set":{"X-User-Id":"$jwt_claim_sub","X-Username":"$jwt_claim_username","X-Roles":"$jwt_claim_roles","X-Tenant-Id":"$jwt_claim_tenant_id"}}}},"upstream":{"type":"roundrobin","nodes":{"%s":1}}}' "$KNOWLEDGE_SERVICE")"

              echo "Registering AI route: /api/v1/ai/* -> koduck-ai (openid-connect + governance baseline)"
              curl -fsS -X PUT "${ADMIN}/routes/api-ai" \
                -H "$KEY" -H 'Content-Type: application/json' \
                -d "$(printf '{"uri":"/api/v1/ai/*","priority":10,"plugins":{"openid-connect":{"client_id":"koduck-ai","client_secret":"%s","discovery":"http://%s/.well-known/openid-configuration","scope":"openid","ssl_verify":false,"timeout":10,"bearer_only":true,"use_jwks":true,"token_signing_alg_values_expected":"RS256","set_access_token_header":true,"access_token_in_authorization_header":true,"set_id_token_header":false,"set_userinfo_header":false,"jwk_expires_in":3600},"limit-count":{"count":120,"time_window":60,"key":"$consumer_name $uri","key_type":"var_combination","rejected_code":429,"rejected_msg":"ai gateway quota exceeded"},"limit-req":{"rate":20,"burst":10,"key":"$consumer_name $uri","key_type":"var_combination","rejected_code":429,"rejected_msg":"ai gateway burst limited","nodelay":true},"opentelemetry":{"sampler":{"name":"always_on"}},"proxy-rewrite":{"headers":{"set":{"X-Auth-Provider":"apisix-oidc","X-Request-Id":"$request_id","X-Trace-Id":"$opentelemetry_trace_id","traceparent":"$opentelemetry_context_traceparent","X-User-Id":"$consumer_name","X-Session-Id":"$http_x_session_id","X-Tenant-Id":"$jwt_claim_tenant_id"}}}},"upstream":{"type":"roundrobin","nodes":{"%s":1}}}' "$JWT_SECRET" "$AUTH_SERVICE" "$AI_SERVICE")"

              echo "Registering gRPC upstreams for memory"
              # 治理策略（Task 8.1 / ADR-0023）：超时 connect=1s send=5s read=65s,
              # 轻重试 retries=1（仅 transport error），trace 透传，限流
              upsert_resource "upstreams" "ai-memory-grpc" "$(printf '{"name":"ai-memory-grpc","type":"roundrobin","scheme":"grpc","retries":1,"timeout":{"connect":1,"send":5,"read":65},"nodes":{"%s":1}}' "$MEMORY_GRPC_SERVICE")"

              echo "Registering gRPC routes for memory"
              upsert_resource "routes" "ai-memory-grpc-route" '{"uri":"/koduck.memory.v1.MemoryService/*","priority":200,"plugins":{"limit-count":{"count":600,"time_window":60,"key":"$uri","key_type":"var","rejected_code":429,"rejected_msg":"ai memory grpc quota exceeded"},"limit-req":{"rate":120,"burst":60,"key":"$uri","key_type":"var","rejected_code":429,"rejected_msg":"ai memory grpc burst limited","nodelay":true},"opentelemetry":{"sampler":{"name":"always_on"}},"proxy-rewrite":{"headers":{"set":{"X-Request-Id":"$http_x_request_id","X-Trace-Id":"$opentelemetry_trace_id","traceparent":"$opentelemetry_context_traceparent","X-Session-Id":"$http_x_session_id","X-User-Id":"$http_x_user_id","X-Tenant-Id":"$http_x_tenant_id"}}}},"upstream_id":"ai-memory-grpc"}'
              if [ "${TOOL_GRPC_ENABLED}" = "true" ]; then
                echo "Registering gRPC upstream/route for tool"
                upsert_resource "upstreams" "ai-tool-grpc" "$(printf '{"name":"ai-tool-grpc","type":"roundrobin","scheme":"grpc","retries":1,"timeout":{"connect":1,"send":5,"read":65},"nodes":{"%s":1}}' "$TOOL_GRPC_SERVICE")"
                upsert_resource "routes" "ai-tool-grpc-route" '{"uri":"/koduck.tool.v1.ToolService/*","priority":200,"plugins":{"limit-count":{"count":600,"time_window":60,"key":"$uri","key_type":"var","rejected_code":429,"rejected_msg":"ai tool grpc quota exceeded"},"limit-req":{"rate":120,"burst":60,"key":"$uri","key_type":"var","rejected_code":429,"rejected_msg":"ai tool grpc burst limited","nodelay":true},"opentelemetry":{"sampler":{"name":"always_on"}},"proxy-rewrite":{"headers":{"set":{"X-Request-Id":"$http_x_request_id","X-Trace-Id":"$opentelemetry_trace_id","traceparent":"$opentelemetry_context_traceparent","X-Session-Id":"$http_x_session_id","X-User-Id":"$http_x_user_id","X-Tenant-Id":"$http_x_tenant_id"}}}},"upstream_id":"ai-tool-grpc"}'
              else
                echo "Tool gRPC route disabled; removing stale ai-tool-grpc resources if present"
                delete_resource "routes" "ai-tool-grpc-route" || true
                delete_resource "upstreams" "ai-tool-grpc" || true
              fi

              echo "Removing deprecated llm adapter gRPC routes and upstreams"
              delete_resource "routes" "ai-llm-stream-grpc-route" || true
              delete_resource "routes" "ai-llm-grpc-route" || true
              delete_resource "upstreams" "ai-llm-stream-grpc" || true
              delete_resource "upstreams" "ai-llm-grpc" || true

              if [ "${ENABLE_AI_GRPC_TRANSCODE}" = "true" ]; then
                echo "grpc-transcode migration window enabled; route definitions should be added with explicit proto assets."
              else
                echo "grpc-transcode migration window disabled; no transcode routes registered."
              fi

              echo "Registering frontend catch-all route: /* -> frontend"
              curl -fsS -X PUT "${ADMIN}/routes/frontend-root" \
                -H "$KEY" -H 'Content-Type: application/json' \
                -d "$(printf '{"uri":"/*","upstream":{"type":"roundrobin","nodes":{"%s":1}}}' "$FRONTEND_SERVICE")"

              ENABLE_ROLLBACK=0
              cleanup_temp_files
              echo "All registrations done."
