spring:
  application:
    name: koduck-user
  datasource:
    url: jdbc:postgresql://${USER_DB_HOST:${DB_HOST:localhost}}:${USER_DB_PORT:${DB_PORT:5432}}/${USER_DB_NAME:${DB_NAME:koduck_user}}
    username: ${USER_DB_USER:${DB_USERNAME:koduck}}
    password: ${USER_DB_PASSWORD:${DB_PASSWORD:}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: KoduckUserHikariPool
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  threads:
    virtual:
      enabled: true

server:
  port: ${SERVER_PORT:8082}
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml
    min-response-size: 2048

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
    prometheus:
      enabled: true
  health:
    db:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      slo:
        http.server.requests: 50ms,100ms,200ms,500ms,1s,2s
      percentiles:
        http.server.requests: 0.5,0.95,0.99

logging:
  level:
    root: INFO
    com.koduck: DEBUG

# Auth 服务调用配置（可选链路，默认关闭）
auth:
  base-url: ${AUTH_BASE_URL:http://apisix:9080}
  api-key: ${AUTH_API_KEY:}
  connect-timeout: 3000
  read-timeout: 5000
  retry:
    max-attempts: 2
    backoff-millis: 500
  introspection:
    enabled: ${AUTH_INTROSPECTION_ENABLED:false}

# Koduck User 自定义配置
koduck:
  user:
    avatar:
      storage-type: ${AVATAR_STORAGE_TYPE:local}
      local-path: ${AVATAR_LOCAL_PATH:/tmp/koduck-avatars}
      max-file-size: ${AVATAR_MAX_FILE_SIZE:2MB}
    default-role: ${USER_DEFAULT_ROLE:user}
  pagination:
    default-page-size: 20
    max-page-size: 100

# 头像存储配置（Task 6.1：对齐设计文档 7.1，保留旧键兼容）
storage:
  avatar:
    provider: ${STORAGE_PROVIDER:${AVATAR_STORAGE_TYPE:local}} # local, s3
    local:
      path: ${AVATAR_STORAGE_PATH:${AVATAR_LOCAL_PATH:/data/avatars}}
      base-url: ${AVATAR_BASE_URL:http://localhost:${SERVER_PORT:8082}/avatars}
    s3:
      bucket: ${S3_BUCKET:}
      region: ${S3_REGION:}
      access-key: ${S3_ACCESS_KEY:}
      secret-key: ${S3_SECRET_KEY:}
