spring:
  application:
    name: koduck-user
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:user_db}
    username: ${DB_USERNAME:koduck}
    password: ${DB_PASSWORD:koduck}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: KoduckUserHikariPool
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  threads:
    virtual:
      enabled: true

server:
  port: ${SERVER_PORT:8082}
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml
    min-response-size: 2048

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
    prometheus:
      enabled: true
  health:
    db:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      slo:
        http.server.requests: 50ms,100ms,200ms,500ms,1s,2s
      percentiles:
        http.server.requests: 0.5,0.95,0.99

logging:
  level:
    root: INFO
    com.koduck: DEBUG

# Koduck User 自定义配置
koduck:
  user:
    avatar:
      storage-type: ${AVATAR_STORAGE_TYPE:local}
      local-path: ${AVATAR_LOCAL_PATH:/tmp/koduck-avatars}
      max-file-size: ${AVATAR_MAX_FILE_SIZE:2MB}
    default-role: ${USER_DEFAULT_ROLE:user}
  pagination:
    default-page-size: 20
    max-page-size: 100
